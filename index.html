<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Bancas OLED - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilo OLED para economia de energia e conforto visual em TVs */
        body { background-color: #000000; }
        .card-ativo { 
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); 
            border-color: rgba(59, 130, 246, 0.6) !important; 
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .transition-all { transition: all 0.4s ease; }
        
        /* Ajuste de seleção de texto para facilitar edição */
        ::selection { background: #1e40af; color: white; }
    </style>
</head>
<body class="text-gray-200 p-6 md:p-10 font-sans">

    <div class="max-w-7xl mx-auto">
        <div id="headerDinamico" class="bg-black border border-gray-900 rounded-2xl p-8 mb-10 shadow-2xl transition-all border-t-4">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-8 items-center">
                
                <div class="border-r border-gray-900 pr-4">
                    <p class="text-[10px] font-black text-gray-600 uppercase tracking-[0.2em] mb-2">Investimento Base</p>
                    <input type="text" id="bancaInicialInput" 
                        onfocus="this.select()"
                        oninput="tratarInputBanca(this)"
                        class="bg-transparent text-2xl font-mono font-bold text-blue-500 outline-none w-full border-b border-transparent focus:border-blue-900 transition-all">
                </div>

                <div class="border-r border-gray-900 pr-4">
                    <p class="text-[10px] font-black text-gray-600 uppercase tracking-[0.2em] mb-2">Saldo Total Atual</p>
                    <p id="totalGeral" class="text-3xl font-mono font-bold text-white tracking-tighter">R$ 0,00</p>
                </div>
                
                <div>
                    <p class="text-[10px] text-gray-600 uppercase font-black tracking-[0.2em] mb-2">Lucro do Mês</p>
                    <p id="lucroGeral" class="text-2xl font-mono">R$ 0,00</p>
                </div>

                <div id="containerSaque" class="border-l border-gray-900 pl-6 opacity-30 transition-all">
                    <p class="text-[10px] font-black text-yellow-600 uppercase tracking-[0.2em] mb-2 font-bold italic underline">Disponível p/ Saque</p>
                    <p id="saqueRecomendado" class="text-2xl font-mono font-bold text-yellow-500">R$ 0,00</p>
                </div>

                <div class="flex flex-col gap-2">
                    <button onclick="adicionarConta()" class="bg-blue-700 hover:bg-blue-600 text-white py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all">
                        + Nova Conta
                    </button>
                    <button onclick="resetarSaldos()" class="border border-red-950 text-red-700 hover:bg-red-900 hover:text-white py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all">
                        Zerar Mês
                    </button>
                </div>
            </div>
        </div>

        <div id="gridContas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
    </div>

    <script>
        // Gestão de Memória Local
        let bancaBase = parseFloat(localStorage.getItem('banca_v6')) || 5000;
        let contas = JSON.parse(localStorage.getItem('contas_v6')) || [
            { id: 1, nome: 'BETANO - EVERTON', saldo: 0 }
        ];

        function moneyFormat(num) {
            return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        // Máscara estilo Banco
        function formatarMoedaInput(inputValor) {
            let v = inputValor.replace(/\D/g, '');
            v = (v / 100).toFixed(2);
            return parseFloat(v);
        }

        function tratarInputBanca(el) {
            bancaBase = formatarMoedaInput(el.value);
            el.value = moneyFormat(bancaBase);
            localStorage.setItem('banca_v6', bancaBase);
            calcularGlobal();
        }

        function tratarInputConta(el, id) {
            const novoSaldo = formatarMoedaInput(el.value);
            const index = contas.findIndex(c => c.id === id);
            contas[index].saldo = novoSaldo;
            el.value = moneyFormat(novoSaldo);
            localStorage.setItem('contas_v6', JSON.stringify(contas));
            calcularGlobal();
        }

        function calcularGlobal() {
            const somaAtivos = contas.reduce((acc, c) => acc + c.saldo, 0);
            const lucro = somaAtivos - bancaBase;

            // Atualiza Saldo e Lucro
            document.getElementById('totalGeral').innerText = moneyFormat(somaAtivos);
            const lucroEl = document.getElementById('lucroGeral');
            lucroEl.innerText = moneyFormat(lucro);

            // Ajuste 1: Lógica de Saque
            const saqueEl = document.getElementById('saqueRecomendado');
            const containerSaque = document.getElementById('containerSaque');
            if (lucro > 0) {
                saqueEl.innerText = moneyFormat(lucro);
                containerSaque.classList.remove('opacity-30');
                containerSaque.classList.add('opacity-100');
            } else {
                saqueEl.innerText = "R$ 0,00";
                containerSaque.classList.add('opacity-30');
                containerSaque.classList.remove('opacity-100');
            }

            // Cores do Header
            const header = document.getElementById('headerDinamico');
            if (lucro > 0) {
                lucroEl.className = "text-2xl font-mono text-green-500 font-bold";
                header.style.borderTopColor = "#16a34a"; // Verde
            } else if (lucro < 0) {
                lucroEl.className = "text-2xl font-mono text-red-600 font-bold";
                header.style.borderTopColor = "#991b1b"; // Vermelho escuro
            } else {
                lucroEl.className = "text-2xl font-mono text-gray-600";
                header.style.borderTopColor = "#1f2937";
            }
        }

        function renderizarContas() {
            const grid = document.getElementById('gridContas');
            grid.innerHTML = '';
            contas.forEach(c => {
                const card = `
                    <div class="bg-black border border-gray-900 p-6 rounded-2xl relative transition-all ${c.saldo > 0 ? 'card-ativo' : ''}">
                        <button onclick="removerConta(${c.id})" class="absolute top-4 right-4 text-gray-800 hover:text-red-600 transition-colors">✕</button>
                        <h3 class="text-blue-600 text-[10px] font-black uppercase tracking-[0.2em] mb-4 italic">${c.nome}</h3>
                        <p class="text-[9px] text-gray-700 uppercase mb-1 font-bold">Saldo do Dia</p>
                        <input type="text" value="${moneyFormat(c.saldo)}" 
                            onfocus="this.select()"
                            oninput="tratarInputConta(this, ${c.id})"
                            class="bg-transparent border-b border-gray-900 focus:border-blue-700 outline-none w-full text-3xl font-mono text-white pb-1 transition-all">
                    </div>`;
                grid.innerHTML += card;
            });
            calcularGlobal();
        }

        // Funções de Gerenciamento
        function adicionarConta() {
            const nome = prompt("Identificação da Conta (Ex: Betano Everton):");
            if (nome) {
                contas.push({ id: Date.now(), nome: nome.toUpperCase(), saldo: 0 });
                localStorage.setItem('contas_v6', JSON.stringify(contas));
                renderizarContas();
            }
        }

        function removerConta(id) {
            if (confirm("Remover esta conta do painel?")) {
                contas = contas.filter(c => c.id !== id);
                localStorage.setItem('contas_v6', JSON.stringify(contas));
                renderizarContas();
            }
        }

        function resetarSaldos() {
            if (confirm("Zerar todos os saldos para iniciar novo mês? (Os nomes das contas serão mantidos)")) {
                contas.forEach(c => c.saldo = 0);
                localStorage.setItem('contas_v6', JSON.stringify(contas));
                renderizarContas();
            }
        }

        // Inicialização do App
        document.getElementById('bancaInicialInput').value = moneyFormat(bancaBase);
        renderizarContas();
    </script>
</body>
</html>
