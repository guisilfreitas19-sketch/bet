<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Master Dashboard OLED 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #e5e7eb; font-family: sans-serif; }
        .card-oled { background-color: #000; border: 1px solid #1a1a1a; border-radius: 1.5rem; transition: all 0.3s ease; }
        .card-oled:hover { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); }
        .barra-progresso { height: 2px; background: #111; border-radius: 2px; overflow: hidden; margin-top: 12px; }
        .progresso-fill { height: 100%; background: #3b82f6; transition: width 0.8s ease; }
        input { background: transparent; border-bottom: 1px solid #1a1a1a; outline: none; width: 100%; transition: all 0.3s; }
        input:focus { border-color: #3b82f6; }
        /* Blur mais forte para sigilo total */
        .valor-privado { filter: blur(12px) grayscale(100%); pointer-events: none; opacity: 0.5; }
        .borda-privada { border-top-color: #1f2937 !important; }
    </style>
</head>
<body class="p-6 md:p-10">

    <div class="max-w-7xl mx-auto">
        <div id="headerDinamico" class="bg-black border border-gray-900 rounded-[2rem] p-8 mb-10 border-t-4 transition-all shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-8 items-center">
                
                <div>
                    <p class="text-[10px] font-black text-gray-600 uppercase tracking-widest mb-1">Investimento Inicial</p>
                    <input type="text" id="campoBancaBase" class="text-2xl font-mono font-bold text-blue-500">
                </div>

                <div>
                    <p class="text-[10px] font-black text-gray-600 uppercase tracking-widest mb-1">Lucro Total</p>
                    <p id="exibirLucro" class="text-3xl font-mono font-bold tracking-tighter transition-all">R$ 0,00</p>
                </div>

                <div id="containerSaque" class="opacity-20 border-l border-gray-900 pl-6">
                    <p class="text-[10px] font-black text-yellow-600 uppercase tracking-widest mb-1 italic underline">Sugestão de Saque</p>
                    <p id="exibirSaque" class="text-2xl font-mono font-bold text-yellow-500">R$ 0,00</p>
                </div>

                <div class="lg:col-span-2 flex flex-col gap-2">
                    <button id="botaoAdd" class="bg-blue-700 hover:bg-blue-600 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">
                        ＋ ADICIONAR CONTA
                    </button>
                    <div class="flex gap-2">
                        <button id="btnPrivacidade" class="flex-1 bg-gray-900 border border-gray-800 text-gray-400 py-2 rounded-xl flex items-center justify-center gap-2">
                            <span id="eyeIcon">👁️</span> MODO PRIVADO
                        </button>
                        <button id="btnBackup" class="flex-1 border border-gray-900 text-gray-600 py-2 rounded-xl text-[9px] font-bold uppercase">BACKUP</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="listaContas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>

    <script>
        let bancaBase = parseFloat(localStorage.getItem('banca_v101')) || 5000;
        let contas = JSON.parse(localStorage.getItem('contas_v101')) || [{ id: Date.now(), nome: 'BETANO - EVERTON', saldo: 0 }];
        let privacidade = false;

        const real = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        function atualizar() {
            let soma = contas.reduce((acc, c) => acc + c.saldo, 0);
            let lucro = soma - bancaBase;

            const displayLucro = document.getElementById('exibirLucro');
            const displaySaque = document.getElementById('exibirSaque');
            const containerSaque = document.getElementById('containerSaque');
            const header = document.getElementById('headerDinamico');

            displayLucro.innerText = real(lucro);
            
            // Lógica de Cor vs Privacidade
            if (privacidade) {
                displayLucro.className = "text-3xl font-mono font-bold tracking-tighter valor-privado";
                header.classList.add('borda-privada');
            } else {
                displayLucro.className = `text-3xl font-mono font-bold tracking-tighter ${lucro >= 0 ? 'text-green-500' : 'text-red-600'}`;
                header.classList.remove('borda-privada');
                header.style.borderTopColor = lucro >= 0 ? "#16a34a" : "#991b1b";
            }

            if (lucro > 0) {
                displaySaque.innerText = real(lucro);
                containerSaque.style.opacity = privacidade ? "0.1" : "1";
            } else {
                displaySaque.innerText = "R$ 0,00";
                containerSaque.style.opacity = "0.2";
            }

            localStorage.setItem('contas_v101', JSON.stringify(contas));
            localStorage.setItem('banca_v101', bancaBase);
            renderizarBarras();
        }

        function criarCard(conta) {
            const div = document.createElement('div');
            div.className = 'card-oled p-6 relative';
            div.id = 'card-' + conta.id;

            div.innerHTML = `
                <button class="absolute top-4 right-4 text-gray-800 hover:text-red-600" onclick="deletar(${conta.id})">✕</button>
                <p class="text-[10px] text-blue-700 font-black uppercase tracking-widest mb-4 italic cursor-pointer" onclick="mudarNome(${conta.id})">${conta.nome} ✏️</p>
                <input type="text" value="${real(conta.saldo)}" id="input-${conta.id}" class="text-3xl font-mono text-white pb-2 ${privacidade ? 'valor-privado' : ''}">
                <div class="barra-progresso"><div class="progresso-fill" id="fill-${conta.id}"></div></div>
            `;

            document.getElementById('listaContas').appendChild(div);

            const inputField = document.getElementById('input-' + conta.id);
            inputField.oninput = function() {
                let v = this.value.replace(/\D/g, '');
                let num = parseFloat((v / 100).toFixed(2)) || 0;
                conta.saldo = num;
                this.value = real(num);
                atualizar();
            };
            inputField.onfocus = function() { this.select(); };
        }

        function renderizarBarras() {
            contas.forEach(c => {
                const fill = document.getElementById('fill-' + c.id);
                if (fill) {
                    const pct = bancaBase > 0 ? (c.saldo / bancaBase) * 100 : 0;
                    fill.style.width = Math.min(pct, 100) + '%';
                }
            });
        }

        document.getElementById('botaoAdd').onclick = function() {
            const nova = { id: Date.now(), nome: 'NOVA CONTA', saldo: 0 };
            contas.push(nova);
            criarCard(nova);
            atualizar();
        };

        document.getElementById('btnPrivacidade').onclick = function() {
            privacidade = !privacidade;
            document.getElementById('eyeIcon').innerText = privacidade ? '🙈' : '👁️';
            // Recarrega cards para aplicar o blur nos inputs
            document.getElementById('listaContas').innerHTML = '';
            contas.forEach(c => criarCard(c));
            atualizar();
        };

        document.getElementById('btnBackup').onclick = function() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({bancaBase, contas}));
            const a = document.createElement('a');
            a.setAttribute("href", dataStr);
            a.setAttribute("download", "backup_apostas.json");
            a.click();
        };

        window.mudarNome = (id) => {
            let n = prompt("Nome da conta:");
            if(n) {
                let c = contas.find(x => x.id === id);
                c.nome = n.toUpperCase();
                document.getElementById('listaContas').innerHTML = '';
                contas.forEach(cx => criarCard(cx));
                atualizar();
            }
        };

        window.deletar = (id) => {
            if(confirm("Excluir conta?")) {
                contas = contas.filter(c => c.id !== id);
                document.getElementById('card-'+id).remove();
                atualizar();
            }
        };

        document.getElementById('campoBancaBase').oninput = function() {
            let v = this.value.replace(/\D/g, '');
            bancaBase = parseFloat((v / 100).toFixed(2)) || 0;
            this.value = real(bancaBase);
            atualizar();
        };

        // Início
        document.getElementById('campoBancaBase').value = real(bancaBase);
        contas.forEach(c => criarCard(c));
        atualizar();

    </script>
</body>
</html>
