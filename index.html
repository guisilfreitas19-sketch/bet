<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Bancas v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-ativo { 
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); 
            border-color: rgba(59, 130, 246, 0.5) !important; 
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-black text-gray-200 p-6 md:p-10 font-sans">

    <div class="max-w-6xl mx-auto">
        <div id="headerDinamico" class="bg-gray-900 border-t-4 border-gray-800 rounded-xl p-6 mb-10 shadow-2xl transition-all">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-center text-center md:text-left">
                
                <div>
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Investimento Inicial</p>
                    <input type="text" id="bancaInicialInput" oninput="tratarInputBanca(this)"
                        class="bg-transparent text-2xl font-mono font-bold text-blue-400 outline-none w-full border-b border-transparent focus:border-blue-500">
                </div>

                <div>
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Saldo Consolidado</p>
                    <p id="totalGeral" class="text-3xl font-mono font-bold text-white uppercase">R$ 0,00</p>
                </div>

                <div>
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Lucro Líquido</p>
                    <p id="lucroGeral" class="text-2xl font-mono text-gray-400">R$ 0,00</p>
                </div>

                <div class="flex flex-col gap-2">
                    <button onclick="adicionarConta()" class="bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest transition-all">
                        + Nova Conta
                    </button>
                    <button onclick="resetarSaldos()" class="border border-red-900 text-red-500 hover:bg-red-900 hover:text-white py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest transition-all">
                        Resetar Mês
                    </button>
                </div>
            </div>
        </div>

        <div id="gridContas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>

    <script>
        // Dados iniciais
        let bancaBase = parseFloat(localStorage.getItem('banca_v5')) || 5000;
        let contas = JSON.parse(localStorage.getItem('contas_v5')) || [
            { id: 1, nome: 'BETANO - EVERTON', saldo: 0 }
        ];

        // Formatação simples
        function moneyFormat(num) {
            return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        // Máscara de entrada para os inputs
        function formatarMoedaInput(inputValor) {
            let v = inputValor.replace(/\D/g, '');
            v = (v / 100).toFixed(2);
            return parseFloat(v);
        }

        function tratarInputBanca(el) {
            bancaBase = formatarMoedaInput(el.value);
            el.value = moneyFormat(bancaBase);
            localStorage.setItem('banca_v5', bancaBase);
            calcularGlobal();
        }

        function tratarInputConta(el, id) {
            const novoSaldo = formatarMoedaInput(el.value);
            const index = contas.findIndex(c => c.id === id);
            contas[index].saldo = novoSaldo;
            el.value = moneyFormat(novoSaldo);
            localStorage.setItem('contas_v5', JSON.stringify(contas));
            calcularGlobal();
        }

        function calcularGlobal() {
            const somaAtivos = contas.reduce((acc, c) => acc + c.saldo, 0);
            const lucro = somaAtivos - bancaBase;
            const roi = bancaBase > 0 ? (lucro / bancaBase) * 100 : 0;

            document.getElementById('totalGeral').innerText = moneyFormat(somaAtivos);
            const lucroEl = document.getElementById('lucroGeral');
            lucroEl.innerText = moneyFormat(lucro);

            const header = document.getElementById('headerDinamico');
            if (lucro > 0) {
                lucroEl.className = "text-2xl font-mono text-green-400 font-bold";
                header.style.borderTopColor = "#22c55e";
            } else if (lucro < 0) {
                lucroEl.className = "text-2xl font-mono text-red-500 font-bold";
                header.style.borderTopColor = "#ef4444";
            } else {
                lucroEl.className = "text-2xl font-mono text-gray-400";
                header.style.borderTopColor = "#1f2937";
            }
        }

        function renderizarContas() {
            const grid = document.getElementById('gridContas');
            grid.innerHTML = '';
            contas.forEach(c => {
                const card = `
                    <div class="bg-gray-900 border border-gray-800 p-6 rounded-xl relative transition-all ${c.saldo > 0 ? 'card-ativo' : ''}">
                        <button onclick="removerConta(${c.id})" class="absolute top-3 right-3 text-gray-700 hover:text-red-500">✕</button>
                        <h3 class="text-blue-500 text-[10px] font-black uppercase tracking-widest mb-4">${c.nome}</h3>
                        <p class="text-[9px] text-gray-500 uppercase mb-1 font-bold">Saldo Atual</p>
                        <input type="text" value="${moneyFormat(c.saldo)}" 
                            onfocus="this.select()"
                            oninput="tratarInputConta(this, ${c.id})"
                            class="bg-transparent border-b border-gray-800 focus:border-blue-500 outline-none w-full text-2xl font-mono text-white pb-1 transition-all">
                    </div>`;
                grid.innerHTML += card;
            });
            calcularGlobal();
        }

        function adicionarConta() {
            const nome = prompt("Nome da conta:");
            if (nome) {
                contas.push({ id: Date.now(), nome: nome.toUpperCase(), saldo: 0 });
                localStorage.setItem('contas_v5', JSON.stringify(contas));
                renderizarContas();
            }
        }

        function removerConta(id) {
            if (confirm("Excluir conta?")) {
                contas = contas.filter(c => c.id !== id);
                localStorage.setItem('contas_v5', JSON.stringify(contas));
                renderizarContas();
            }
        }

        function resetarSaldos() {
            if (confirm("Zerar saldos das contas para novo mês?")) {
                contas.forEach(c => c.saldo = 0);
                localStorage.setItem('contas_v5', JSON.stringify(contas));
                renderizarContas();
            }
        }

        // Início
        document.getElementById('bancaInicialInput').value = moneyFormat(bancaBase);
        renderizarContas();
    </script>
</body>
</html>
