<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bet Dashboard - Gestão de Capital v1.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Inter', sans-serif; transition: all 0.5s; overflow-x: hidden; }
        .card-oled { 
            background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 2rem; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; padding: 1.5rem; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        }
        .card-oled:hover { border-color: #3b82f6; box-shadow: 0 20px 40px rgba(59, 130, 246, 0.08); transform: translateY(-4px); }
        
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.3); }
            70% { box-shadow: 0 0 25px 10px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
        .saque-ativo { animation: pulse-gold 2s infinite; border-color: #fbbf24 !important; background: #fffdf2; }

        input { background: transparent; border-bottom: 1px solid #f1f5f9; outline: none; transition: all 0.3s; font-family: 'JetBrains Mono', monospace; }
        input:focus { border-color: #3b82f6; }
        
        .valor-privado { filter: blur(14px); opacity: 0.2; pointer-events: none; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="p-6 md:p-12">

<div class="max-w-7xl mx-auto">

    <div id="headerDinamico" class="bg-white border border-slate-200 rounded-[2.5rem] p-8 md:p-10 mb-12 border-t-[6px] transition-all shadow-xl shadow-slate-200/50">
        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8 items-center">
            
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">Seu Retorno Total (Líquido)</p>
                <p id="exibirLucro" class="text-5xl font-mono font-bold tracking-tighter text-emerald-500">R$ 0,00</p>
            </div>

            <div id="containerSaque" class="border border-slate-100 p-5 rounded-[1.5rem] opacity-30">
                <p class="text-[9px] font-black text-amber-600 uppercase tracking-widest mb-1 italic">Disponível p/ seu Saque</p>
                <p id="exibirSaqueTotal" class="text-2xl font-mono font-bold text-amber-500">R$ 0,00</p>
            </div>

            <div class="lg:col-span-2 flex flex-col sm:flex-row gap-3">
                <button id="btnNovoCard" class="flex-1 bg-slate-900 hover:bg-blue-600 text-white py-4 rounded-2xl text-[11px] font-black uppercase tracking-[0.2em]">＋ Nova Conta</button>
                <button id="btnPrivacidade" class="bg-white border border-slate-200 text-slate-500 px-6 py-3 rounded-2xl text-[10px] font-bold uppercase">👁️</button>
                <button id="btnReset" class="bg-red-50 text-red-500 px-6 py-3 rounded-2xl text-[10px] font-bold uppercase">Zerar Mês</button>
            </div>
        </div>
    </div>

    <div id="listaContas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
</div>

<script>
// 🔒 proteção global
function safeNumber(v) {
    return isNaN(v) || v === null ? 0 : Number(v);
}

// 🔒 carregar + limpar dados antigos quebrados
let contasStorage = JSON.parse(localStorage.getItem('c_v105')) || [];

contasStorage = contasStorage.map(c => ({
    ...c,
    saldo: safeNumber(c.saldo),
    investimento: safeNumber(c.investimento),
    comissao: safeNumber(c.comissao)
}));

let db = {
    contas: contasStorage.length ? contasStorage : [
        { id: 1, nome: 'BETANO EVERTON', saldo: 0, investimento: 4000, comissao: 90 },
        { id: 2, nome: 'GUILHERME', saldo: 0, investimento: 1000, comissao: 100 },
        { id: 3, nome: 'HINGRID', saldo: 0, investimento: 0, comissao: 50 }
    ],
    privacidade: false
};

const fmt = (v) => safeNumber(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

function salvar() {
    localStorage.setItem('c_v105', JSON.stringify(db.contas));
    calcular();
}

function calcular() {
    let total = 0;

    db.contas.forEach(c => {
        let saldo = safeNumber(c.saldo);
        let investimento = safeNumber(c.investimento);
        let comissao = safeNumber(c.comissao);

        let lucroBruto = saldo - investimento;
        let lucroMeu = lucroBruto > 0 ? lucroBruto * (comissao / 100) : lucroBruto;

        total += investimento + lucroMeu;
    });

    document.getElementById('exibirLucro').innerText = fmt(total);
    document.getElementById('exibirSaqueTotal').innerText = fmt(total);

    const box = document.getElementById('containerSaque');
    box.style.opacity = total > 0 ? "1" : "0.3";
    box.classList.toggle('saque-ativo', total > 0);
}

function render() {
    const container = document.getElementById('listaContas');
    container.innerHTML = '';

    db.contas.forEach(c => {
        let saldo = safeNumber(c.saldo);
        let investimento = safeNumber(c.investimento);
        let lucro = saldo - investimento;

        const div = document.createElement('div');
        div.className = 'card-oled';

        div.innerHTML = `
            <button class="absolute top-4 right-4 text-slate-300 hover:text-red-500" onclick="apiExcluir(${c.id})">✕</button>
            
            <input value="${c.nome}" oninput="apiUpdate(${c.id}, 'nome', this.value)" class="text-xs font-black uppercase text-blue-500 w-full mb-2">

            <div class="text-xs text-slate-400 mb-2">
                Invest: <input type="number" value="${investimento}" oninput="apiUpdate(${c.id}, 'investimento', this.value)" class="w-16">
                Comissão: <input type="number" value="${c.comissao}" oninput="apiUpdate(${c.id}, 'comissao', this.value)" class="w-12">%
            </div>

            <input value="${fmt(saldo)}" oninput="apiMascara(this, ${c.id})" class="text-3xl font-mono w-full mb-2">

            <div class="text-sm font-bold ${lucro >= 0 ? 'text-green-500' : 'text-red-500'}">
                ${fmt(lucro)}
            </div>
        `;

        container.appendChild(div);
    });

    calcular();
}

window.apiUpdate = (id, campo, valor) => {
    const item = db.contas.find(x => x.id === id);
    if (!item) return;

    item[campo] = campo === 'nome'
        ? valor.toUpperCase()
        : safeNumber(parseFloat(valor));

    salvar();
};

window.apiMascara = (el, id) => {
    let v = el.value.replace(/\D/g, '');
    let n = safeNumber(v / 100);

    const item = db.contas.find(x => x.id === id);
    if (item) item.saldo = n;

    el.value = fmt(n);
    salvar();
};

window.apiExcluir = (id) => {
    if (confirm("Remover conta?")) {
        db.contas = db.contas.filter(x => x.id !== id);
        salvar();
        render();
    }
};

document.getElementById('btnNovoCard').onclick = () => {
    db.contas.push({ id: Date.now(), nome: 'NOVA CONTA', saldo: 0, investimento: 0, comissao: 100 });
    salvar();
    render();
};

document.getElementById('btnReset').onclick = () => {
    if (confirm("Zerar saldos?")) {
        db.contas.forEach(c => c.saldo = 0);
        salvar();
        render();
    }
};

render();
</script>

</body>
</html>
