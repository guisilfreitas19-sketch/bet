<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Bancas 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .card { background: #111; border: 1px solid #222; padding: 20px; border-radius: 15px; margin-bottom: 10px; position: relative; }
        input { background: transparent; border-bottom: 1px solid #333; color: #fff; outline: none; width: 100%; font-size: 1.5rem; }
        .btn-blue { background: #2563eb; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; }
        .btn-blue:hover { background: #1d4ed8; }
    </style>
</head>
<body class="p-5">

    <div class="max-w-4xl mx-auto">
        <div class="bg-zinc-900 p-6 rounded-2xl mb-10 flex flex-wrap gap-6 items-center justify-between">
            <div>
                <p class="text-xs text-gray-500 font-bold uppercase">Investimento Inicial</p>
                <input type="text" id="campoBancaBase" style="width: 200px;">
            </div>
            <div>
                <p class="text-xs text-gray-500 font-bold uppercase">Lucro Total</p>
                <p id="exibirLucro" class="text-2xl font-bold text-green-500">R$ 0,00</p>
            </div>
            <button id="botaoAdd" class="btn-blue">＋ ADICIONAR CONTA</button>
        </div>

        <div id="listaContas"></div>
    </div>

    <script>
        // Inicialização de Dados
        let bancaBase = parseFloat(localStorage.getItem('banca_v99')) || 5000;
        let contas = JSON.parse(localStorage.getItem('contas_v99')) || [
            { id: Date.now(), nome: 'MINHA CONTA', saldo: 0 }
        ];

        // Elementos Fixos
        const inputBanca = document.getElementById('campoBancaBase');
        const displayLucro = document.getElementById('exibirLucro');
        const listaContas = document.getElementById('listaContas');
        const botaoAdd = document.getElementById('botaoAdd');

        // Formatação
        const real = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        function atualizarCalculos() {
            let soma = contas.reduce((acc, c) => acc + c.saldo, 0);
            let lucro = soma - bancaBase;
            displayLucro.innerText = real(lucro);
            displayLucro.className = lucro >= 0 ? "text-2xl font-bold text-green-500" : "text-2xl font-bold text-red-500";
            localStorage.setItem('contas_v99', JSON.stringify(contas));
            localStorage.setItem('banca_v99', bancaBase);
        }

        function criarCard(conta) {
            const div = document.createElement('div');
            div.className = 'card';
            div.id = 'card-' + conta.id;

            div.innerHTML = `
                <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
                    <strong style="color: #3b82f6; cursor: pointer;" onclick="mudarNome(${conta.id})">${conta.nome} ✏️</strong>
                    <span style="cursor: pointer; color: #444;" onclick="deletar(${conta.id})">REMOVER ✕</span>
                </div>
                <input type="text" value="${real(conta.saldo)}" id="input-${conta.id}">
            `;

            listaContas.appendChild(div);

            // Adiciona evento de máscara ao input do card
            const inputField = document.getElementById('input-' + conta.id);
            inputField.oninput = function() {
                let v = this.value.replace(/\D/g, '');
                let num = parseFloat((v / 100).toFixed(2)) || 0;
                conta.saldo = num;
                this.value = real(num);
                atualizarCalculos();
            };
            inputField.onfocus = function() { this.select(); };
        }

        // Função do Botão Adicionar (FORÇA BRUTA)
        botaoAdd.onclick = function() {
            console.log("Botão clicado!"); // Aparece no F12 do navegador
            const nova = { id: Date.now(), nome: 'NOVA CONTA', saldo: 0 };
            contas.push(nova);
            criarCard(nova);
            atualizarCalculos();
        };

        window.mudarNome = (id) => {
            let n = prompt("Nome da conta:");
            if(n) {
                let c = contas.find(x => x.id === id);
                c.nome = n.toUpperCase();
                document.getElementById('card-'+id).querySelector('strong').innerText = c.nome + " ✏️";
                atualizarCalculos();
            }
        };

        window.deletar = (id) => {
            if(confirm("Excluir?")) {
                contas = contas.filter(c => c.id !== id);
                document.getElementById('card-'+id).remove();
                atualizarCalculos();
            }
        };

        // Máscara da Banca Inicial
        inputBanca.oninput = function() {
            let v = this.value.replace(/\D/g, '');
            bancaBase = parseFloat((v / 100).toFixed(2)) || 0;
            this.value = real(bancaBase);
            atualizarCalculos();
        };

        // Carregar tela inicial
        inputBanca.value = real(bancaBase);
        contas.forEach(c => criarCard(c));
        atualizarCalculos();

    </script>
</body>
</html>
