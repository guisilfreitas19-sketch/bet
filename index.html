<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bet V2.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Inter', sans-serif; }
        .card-light { background: white; border-radius: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); padding: 2rem; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
        .card-unit { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; border: none; }
        .header-glass { background: white; border-radius: 2.5rem; border: 1px solid #e2e8f0; position: sticky; top: 20px; z-index: 50; }
        input { background: #f1f5f9; border-radius: 0.75rem; padding: 0.6rem; outline: none; border: 1px solid #e2e8f0; width: 100%; font-family: monospace; font-weight: bold; text-align: right; color: #334155; }
        .input-dark { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; }
        .input-dark:focus { background: rgba(255,255,255,0.2); color: white; border-color: #3b82f6; }
        .mini-label { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; }
        .progress-fill { transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .glow-success { box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <div class="header-glass p-8 mb-8 shadow-sm border-t-4 border-blue-600">
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-8 items-center">
                <div class="lg:col-span-1 border-r border-slate-100 pr-6">
                    <p class="mini-label mb-2">Aporte Próprio</p>
                    <p id="exibirInvestimentoTotal" class="text-2xl font-mono font-bold text-slate-700 tracking-tighter">R$ 0,00</p>
                </div>
                <div class="lg:col-span-2 px-4 text-center lg:text-left">
                    <p id="labelLucro" class="mini-label mb-2">Lucro Real Líquido</p>
                    <p id="exibirLucro" class="text-5xl font-mono font-black tracking-tighter text-emerald-600">R$ 0,00</p>
                    <div class="flex justify-center lg:justify-start gap-4 mt-2">
                        <div class="text-[10px] font-bold text-slate-500">🏦 Próprio: <span id="resumoProprio" class="text-emerald-600">R$ 0,00</span></div>
                        <div class="text-[10px] font-bold text-slate-500">🤝 Comissões: <span id="resumoComissoes" class="text-blue-600">R$ 0,00</span></div>
                    </div>
                </div>
                
                <div class="lg:col-span-2 bg-slate-50 p-6 rounded-3xl border border-slate-200">
                    <div class="flex justify-between items-center mb-2">
                        <p class="mini-label text-slate-500">Meta do Mês (Alvo)</p>
                        <div class="relative w-36">
                            <input type="text" id="inputMeta" class="text-xs py-1.5 px-3 bg-white border-slate-200 shadow-sm" placeholder="R$ 0,00">
                        </div>
                    </div>
                    <div class="w-full bg-slate-200 h-5 rounded-full overflow-hidden p-1">
                        <div id="barraMeta" class="progress-fill h-full rounded-full bg-emerald-500" style="width: 0%"></div>
                    </div>
                    <div class="flex justify-between mt-2">
                        <p id="porcentagemMeta" class="text-[10px] font-black text-emerald-600 bg-emerald-50 px-2 rounded-md">0%</p>
                        <p id="faltaMeta" class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Faltam R$ 0,00</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8 mb-8">
            <div class="card-light card-unit lg:col-span-1 flex flex-col justify-between">
                <div>
                    <div class="flex items-center gap-2 mb-4">
                        <div class="p-2 bg-blue-500 rounded-lg">🎯</div>
                        <h3 class="text-xs font-black uppercase tracking-widest text-white/90">Gestão de Unidades</h3>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <p class="mini-label text-white/50 mb-1">Valor da Unidade (R$)</p>
                            <input type="text" id="valUnidade" class="input-dark w-full" oninput="handleUnidade()">
                        </div>
                        <div>
                            <p class="mini-label text-white/50 mb-1">Qtd de Unidades</p>
                            <input type="number" id="qtdUnidades" step="0.1" class="input-dark w-full" oninput="handleUnidade()">
                        </div>
                    </div>
                </div>

                <div class="mt-6 pt-6 border-t border-white/10">
                    <p class="mini-label text-white/50 mb-1">Resultado em Unidades</p>
                    <p id="resUnidadeFinal" class="text-2xl font-mono font-black text-emerald-400">R$ 0,00</p>
                    <p id="statusUnidade" class="text-[10px] font-bold text-white/40 uppercase mt-1">Neutro</p>
                </div>
            </div>

            <div id="listaContas" class="lg:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>
        
        <div class="flex justify-end mb-12">
            <button onclick="addConta()" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-2xl text-[11px] font-black uppercase tracking-widest shadow-xl shadow-blue-200 transition-all active:scale-95">＋ Nova Banca</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('bet_v28_final')) || {
            meta: 5000,
            unidadeValor: 500,
            unidadeQtd: 0,
            contas: [
                { id: 1, nome: 'BETANO - EVERTON', inicial: 4000, saldo: 5000, comissao: 10, proprio: true }
            ]
        };

        const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        function aplicarMascaraR$(valor) {
            let v = String(valor).replace(/\D/g, '');
            return (Number(v) / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function handleUnidade() {
            const inputVal = document.getElementById('valUnidade');
            const rawVal = inputVal.value.replace(/\D/g, '');
            db.unidadeValor = parseFloat(rawVal) / 100;
            db.unidadeQtd = parseFloat(document.getElementById('qtdUnidades').value) || 0;
            
            inputVal.value = aplicarMascaraR$(rawVal);
            
            const totalManual = db.unidadeValor * db.unidadeQtd;
            const resEl = document.getElementById('resUnidadeFinal');
            resEl.innerText = fmt(totalManual);
            
            const statusEl = document.getElementById('statusUnidade');
            if(db.unidadeQtd > 0) {
                resEl.className = "text-2xl font-mono font-black text-emerald-400";
                statusEl.innerText = `Lucro de ${db.unidadeQtd} Unidade(s) ✅`;
            } else if (db.unidadeQtd < 0) {
                resEl.className = "text-2xl font-mono font-black text-red-400";
                statusEl.innerText = `Prejuízo de ${Math.abs(db.unidadeQtd)} Unidade(s) ⚠️`;
            } else {
                resEl.className = "text-2xl font-mono font-black text-white/40";
                statusEl.innerText = "Neutro";
            }
            
            localStorage.setItem('bet_v28_final', JSON.stringify(db));
        }

        function calcular() {
            let aporte = 0, lucroProprio = 0, comissoes = 0;
            
            db.contas.forEach(c => {
                const lucroBruto = c.saldo - c.inicial;
                const valorComR$ = lucroBruto > 0 ? lucroBruto * (c.comissao / 100) : 0;
                
                const cardEl = document.getElementById(`card-${c.id}`);
                const resEl = document.getElementById(`res-${c.id}`);
                const boxEl = document.getElementById(`box-${c.id}`);
                const comValEl = document.getElementById(`com-val-${c.id}`);

                if(resEl) {
                    resEl.innerText = fmt(lucroBruto);
                    if(lucroBruto < 0) cardEl.classList.add('border-l-8', 'border-red-500');
                    else cardEl.classList.remove('border-l-8', 'border-red-500');

                    boxEl.className = `mt-4 p-4 rounded-xl border ${lucroBruto >= 0 ? 'bg-emerald-50 border-emerald-100 text-emerald-700' : 'bg-red-50 border-red-100 text-red-600'}`;
                    comValEl.innerText = fmt(valorComR$);
                }

                if (c.proprio) {
                    aporte += c.inicial;
                    lucroProprio += (lucroBruto - valorComR$);
                } else {
                    comissoes += valorComR$;
                }
            });

            const totalGeral = lucroProprio + comissoes;
            document.getElementById('exibirInvestimentoTotal').innerText = fmt(aporte);
            document.getElementById('exibirLucro').innerText = fmt(totalGeral);
            
            const pct = Math.min(Math.max((totalGeral / db.meta) * 100, 0), 100);
            const barra = document.getElementById('barraMeta');
            barra.style.width = `${pct}%`;
            document.getElementById('porcentagemMeta').innerText = `${pct.toFixed(1)}%`;
            document.getElementById('faltaMeta').innerText = totalGeral >= db.meta ? "META ALCANÇADA ✅" : `Faltam ${fmt(db.meta - totalGeral)}`;

            localStorage.setItem('bet_v28_final', JSON.stringify(db));
        }

        window.handleInput = (el, id, field) => {
            let rawValue = el.value.replace(/\D/g, '');
            let numericValue = parseFloat(rawValue) / 100;
            if(id === 'META') db.meta = numericValue;
            else db.contas.find(c => c.id === id)[field] = numericValue;
            el.value = aplicarMascaraR$(rawValue);
            calcular();
        };

        function addConta() {
            db.contas.push({ id: Date.now(), nome: 'NOVA BANCA', inicial: 0, saldo: 0, comissao: 0, proprio: true });
            render();
        }

        function excluir(id) {
            if(confirm("Remover banca?")) { db.contas = db.contas.filter(c => c.id !== id); render(); }
        }

        function render() {
            const container = document.getElementById('listaContas');
            container.innerHTML = db.contas.map(c => `
                <div id="card-${c.id}" class="card-light">
                    <div class="flex justify-between items-center mb-6">
                        <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest">${c.nome}</p>
                        <button class="text-slate-300 hover:text-red-500 transition-colors" onclick="excluir(${c.id})">✕</button>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <p class="mini-label mb-1">Aporte Inicial</p>
                            <input type="text" value="${aplicarMascaraR$(c.inicial * 100)}" oninput="handleInput(this, ${c.id}, 'inicial')">
                        </div>
                        <div>
                            <p class="mini-label mb-1">Saldo Atual</p>
                            <input type="text" value="${aplicarMascaraR$(c.saldo * 100)}" oninput="handleInput(this, ${c.id}, 'saldo')">
                        </div>
                    </div>
                    <div id="box-${c.id}">
                        <div class="flex justify-between items-center mb-1">
                            <p class="text-[9px] font-bold opacity-30 uppercase">Bruto</p>
                            <span class="text-[9px] font-black uppercase opacity-30">${c.proprio ? 'Comissão Pagar' : 'Sua Comissão'}</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <p id="res-${c.id}" class="text-2xl font-mono font-black">R$ 0,00</p>
                            <p id="com-val-${c.id}" class="font-mono text-xs font-bold"></p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 border-t border-slate-100 pt-5 mt-5">
                        <input type="number" value="${c.comissao}" oninput="db.contas.find(x=>x.id===${c.id}).comissao=this.value; calcular()" class="text-center pr-0 bg-white">
                        <label class="flex items-center gap-2 bg-slate-50 p-2 rounded-xl border border-slate-100 justify-center cursor-pointer">
                            <input type="checkbox" ${c.proprio ? 'checked' : ''} onchange="db.contas.find(x=>x.id===${c.id}).proprio=this.checked; render()" class="w-4 h-4 accent-blue-600">
                            <span class="text-[9px] font-black text-slate-500 uppercase">${c.proprio ? 'Meu Bolso' : 'Terceiro'}</span>
                        </label>
                    </div>
                </div>
            `).join('');
            
            // Sincroniza campos de Unidade
            document.getElementById('valUnidade').value = aplicarMascaraR$(db.unidadeValor * 100);
            document.getElementById('qtdUnidades').value = db.unidadeQtd;
            
            document.getElementById('inputMeta').value = aplicarMascaraR$(db.meta * 100);
            handleUnidade();
            calcular();
        }

        render();
    </script>
</body>
</html>
