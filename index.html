<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bet Dashboard - Gestão de Capital v1.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Inter', sans-serif; }
        .card-oled { 
            background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 2rem; 
            transition: all 0.3s; padding: 1.5rem;
        }
        .card-oled:hover { border-color: #3b82f6; transform: translateY(-4px); }

        .saque-ativo { border-color: #fbbf24 !important; background: #fffdf2; }

        input { border-bottom: 1px solid #f1f5f9; font-family: 'JetBrains Mono', monospace; }
        .valor-privado { filter: blur(10px); opacity: 0.2; }
    </style>
</head>

<body class="p-6">

<div class="max-w-6xl mx-auto">

    <h1 class="text-3xl font-bold mb-6">Dashboard</h1>

    <div class="mb-6">
        <p class="text-sm text-gray-500">Seu Retorno Total</p>
        <p id="exibirLucro" class="text-4xl text-green-500 font-bold">R$ 0,00</p>
    </div>

    <button onclick="novo()" class="mb-6 bg-black text-white px-4 py-2 rounded">+ Nova Conta</button>

    <div id="listaContas" class="grid gap-4"></div>
</div>

<script>
function safeNumber(v) {
    return isNaN(v) || v === null ? 0 : Number(v);
}

// 🔒 Sanitiza dados ao carregar
let contasSalvas = JSON.parse(localStorage.getItem('c_v105')) || [];

contasSalvas = contasSalvas.map(c => ({
    ...c,
    saldo: safeNumber(c.saldo),
    investimento: safeNumber(c.investimento),
    comissao: safeNumber(c.comissao)
}));

let db = {
    contas: contasSalvas.length ? contasSalvas : [
        { id: 1, nome: 'BETANO', saldo: 0, investimento: 4000, comissao: 90 }
    ]
};

const fmt = (v) => safeNumber(v).toLocaleString('pt-BR', {
    style: 'currency',
    currency: 'BRL'
});

function salvar() {
    localStorage.setItem('c_v105', JSON.stringify(db.contas));
    calcular();
}

function calcular() {
    let total = 0;

    db.contas.forEach(c => {
        const saldo = safeNumber(c.saldo);
        const investimento = safeNumber(c.investimento);
        const comissao = safeNumber(c.comissao);

        let lucroBruto = saldo - investimento;
        let lucroMeu = lucroBruto > 0
            ? lucroBruto * (comissao / 100)
            : lucroBruto;

        total += investimento + lucroMeu;
    });

    document.getElementById('exibirLucro').innerText = fmt(total);
}

function render() {
    const container = document.getElementById('listaContas');
    container.innerHTML = '';

    db.contas.forEach(c => {
        const saldo = safeNumber(c.saldo);
        const investimento = safeNumber(c.investimento);
        const lucro = saldo - investimento;

        const div = document.createElement('div');
        div.className = 'card-oled';

        div.innerHTML = `
            <input value="${c.nome}" oninput="update(${c.id}, 'nome', this.value)" class="font-bold mb-2"><br>

            Invest: <input type="number" value="${investimento}" oninput="update(${c.id}, 'investimento', this.value)"><br>
            Comissão: <input type="number" value="${c.comissao}" oninput="update(${c.id}, 'comissao', this.value)">%<br><br>

            Saldo:
            <input value="${fmt(saldo)}" oninput="mascara(this, ${c.id})"><br><br>

            <b>Lucro: ${fmt(lucro)}</b>
        `;

        container.appendChild(div);
    });

    calcular();
}

function update(id, campo, valor) {
    const item = db.contas.find(x => x.id === id);
    if (!item) return;

    if (campo === 'nome') {
        item[campo] = valor;
    } else {
        const num = parseFloat(valor);
        item[campo] = safeNumber(num);
    }

    salvar();
}

function mascara(el, id) {
    let v = el.value.replace(/\D/g, '');
    let n = safeNumber(v / 100);

    const item = db.contas.find(x => x.id === id);
    if (item) item.saldo = n;

    el.value = fmt(n);
    salvar();
}

function novo() {
    db.contas.push({
        id: Date.now(),
        nome: 'NOVA',
        saldo: 0,
        investimento: 0,
        comissao: 100
    });

    salvar();
    render();
}

render();
</script>

</body>
</html>
