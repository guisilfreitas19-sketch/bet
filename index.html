<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bet V2.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Inter', sans-serif; }
        .card-light { background: white; border-radius: 1.5rem; box-shadow: 0 4px 15px -3px rgba(0,0,0,0.05); padding: 1.25rem; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .card-negativo { border-left: 4px solid #ef4444; }
        .card-unit { background: #1e293b; color: white; border: none; }
        .header-glass { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; position: sticky; top: 15px; z-index: 50; }
        input { background: #f1f5f9; border-radius: 0.5rem; padding: 0.4rem; outline: none; border: 1px solid #e2e8f0; width: 100%; font-family: monospace; font-weight: bold; text-align: right; font-size: 13px; }
        input:focus { border-color: #3b82f6; background: white; }
        .mini-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; }
        .progress-fill { transition: width 0.6s ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="header-glass p-6 mb-6 shadow-sm border-t-4 border-blue-600">
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-6 items-center">
                <div class="lg:col-span-1 border-r border-slate-100 pr-4">
                    <p class="mini-label mb-1">Aporte Total</p>
                    <p id="exibirInvestimentoTotal" class="text-xl font-mono font-bold text-slate-700">R$ 0,00</p>
                </div>
                <div class="lg:col-span-2 px-2">
                    <p id="labelLucro" class="mini-label mb-1">Lucro Líquido</p>
                    <p id="exibirLucro" class="text-4xl font-mono font-black tracking-tighter text-emerald-600">R$ 0,00</p>
                    <div class="flex gap-3 mt-1 text-[9px] font-bold text-slate-400 uppercase">
                        <span>🏦 Próprio: <span id="resumoProprio" class="text-emerald-600">R$ 0,00</span></span>
                        <span>🤝 Comissões: <span id="resumoComissoes" class="text-blue-600">R$ 0,00</span></span>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-slate-50 p-4 rounded-2xl border border-slate-200">
                    <div class="flex justify-between items-center mb-1">
                        <p class="mini-label">Meta</p>
                        <input type="text" id="inputMeta" class="w-28 text-[11px] py-0.5 px-2 bg-white" oninput="handleInput(this, 'META')">
                    </div>
                    <div class="w-full bg-slate-200 h-3 rounded-full overflow-hidden">
                        <div id="barraMeta" class="progress-fill h-full bg-emerald-500" style="width: 0%"></div>
                    </div>
                    <div class="flex justify-between mt-1">
                        <p id="porcentagemMeta" class="text-[9px] font-black text-emerald-600">0%</p>
                        <p id="faltaMeta" class="text-[9px] font-bold text-slate-400 uppercase">Faltam R$ 0,00</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center mb-4 px-2">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Bancas Ativas</h2>
            <button onclick="addConta()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-transform active:scale-95">＋ Adicionar</button>
        </div>
        
        <div id="listaContas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8"></div>

        <div class="border-t border-slate-200 pt-8 mt-8">
            <div class="max-w-md mx-auto card-light card-unit">
                <div class="flex items-center gap-3 mb-4">
                    <span class="text-lg">🎯</span>
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-white/80">Gestão Manual de Unidades</h3>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <p class="mini-label text-white/40 mb-1">Valor Unit (R$)</p>
                        <input type="text" id="valUnidade" class="bg-white/10 border-white/10 text-white focus:bg-white/20" oninput="handleUnidade()">
                    </div>
                    <div>
                        <p class="mini-label text-white/40 mb-1">Qtd Units</p>
                        <input type="number" id="qtdUnidades" step="0.1" class="bg-white/10 border-white/10 text-white focus:bg-white/20" oninput="handleUnidade()">
                    </div>
                </div>
                <div class="flex justify-between items-end bg-black/20 p-3 rounded-xl">
                    <div>
                        <p class="mini-label text-white/40">Resultado Estratégico</p>
                        <p id="resUnidadeFinal" class="text-xl font-mono font-black text-emerald-400">R$ 0,00</p>
                    </div>
                    <p id="statusUnidade" class="text-[9px] font-bold text-white/30 uppercase">Neutro</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Chave de salvamento global para persistência entre versões
        const STORAGE_KEY = 'BET_DATA_GLOBAL_V2';
        
        let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            meta: 5000,
            unidadeValor: 500,
            unidadeQtd: 0,
            contas: [
                { id: 1, nome: 'BETANO - EVERTON', inicial: 4000, saldo: 4000, comissao: 10, proprio: true }
            ]
        };

        const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        function aplicarMascaraR$(valor) {
            let v = String(valor).replace(/\D/g, '');
            return (Number(v) / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function salvar() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
        }

        function handleUnidade() {
            const inputVal = document.getElementById('valUnidade');
            const rawVal = inputVal.value.replace(/\D/g, '');
            db.unidadeValor = parseFloat(rawVal) / 100 || 0;
            db.unidadeQtd = parseFloat(document.getElementById('qtdUnidades').value) || 0;
            
            inputVal.value = aplicarMascaraR$(rawVal);
            
            const total = db.unidadeValor * db.unidadeQtd;
            const resEl = document.getElementById('resUnidadeFinal');
            resEl.innerText = fmt(total);
            resEl.className = `text-xl font-mono font-black ${total > 0 ? 'text-emerald-400' : total < 0 ? 'text-red-400' : 'text-white/40'}`;
            document.getElementById('statusUnidade').innerText = total !== 0 ? `${db.unidadeQtd} Units` : 'Neutro';
            
            salvar();
        }

        function calcular() {
            let aporte = 0, lucroProprio = 0, comissoes = 0;
            
            db.contas.forEach(c => {
                const lucroBruto = c.saldo - c.inicial;
                const valorCom = lucroBruto > 0 ? lucroBruto * (c.comissao / 100) : 0;
                
                const cardEl = document.getElementById(`card-${c.id}`);
                const resEl = document.getElementById(`res-${c.id}`);
                const comValEl = document.getElementById(`com-val-${c.id}`);

                if(resEl) {
                    resEl.innerText = fmt(lucroBruto);
                    cardEl.className = `card-light ${lucroBruto < 0 ? 'card-negativo' : ''}`;
                    comValEl.innerText = fmt(valorCom);
                    comValEl.className = `font-mono text-[10px] font-bold ${c.proprio ? 'text-red-400' : 'text-blue-500'}`;
                }

                if (c.proprio) { aporte += c.inicial; lucroProprio += (lucroBruto - valorCom); }
                else { comissoes += valorCom; }
            });

            const total = lucroProprio + comissoes;
            document.getElementById('exibirInvestimentoTotal').innerText = fmt(aporte);
            document.getElementById('exibirLucro').innerText = fmt(total);
            document.getElementById('exibirLucro').className = `text-4xl font-mono font-black tracking-tighter ${total >= 0 ? 'text-emerald-600' : 'text-red-500'}`;
            document.getElementById('resumoProprio').innerText = fmt(lucroProprio);
            document.getElementById('resumoComissoes').innerText = fmt(comissoes);

            const pct = Math.min(Math.max((total / db.meta) * 100, 0), 100);
            document.getElementById('barraMeta').style.width = `${pct}%`;
            document.getElementById('porcentagemMeta').innerText = `${pct.toFixed(1)}%`;
            document.getElementById('faltaMeta').innerText = total >= db.meta ? "META BATIDA ✅" : `Faltam ${fmt(db.meta - total)}`;

            salvar();
        }

        window.handleInput = (el, id, field) => {
            let raw = el.value.replace(/\D/g, '');
            let num = parseFloat(raw) / 100;
            if(id === 'META') db.meta = num;
            else db.contas.find(c => c.id === id)[field] = num;
            el.value = aplicarMascaraR$(raw);
            calcular();
        };

        function addConta() {
            db.contas.push({ id: Date.now(), nome: 'NOVA BANCA', inicial: 0, saldo: 0, comissao: 0, proprio: true });
            render();
        }

        function excluir(id) {
            if(confirm("Excluir?")) { db.contas = db.contas.filter(c => c.id !== id); render(); }
        }

        function render() {
            const container = document.getElementById('listaContas');
            container.innerHTML = db.contas.map(c => `
                <div id="card-${c.id}" class="card-light">
                    <div class="flex justify-between items-center mb-3">
                        <input type="text" value="${c.nome}" oninput="db.contas.find(x=>x.id===${c.id}).nome=this.value; salvar()" class="bg-transparent border-none p-0 text-left text-[10px] uppercase font-black text-blue-600 w-full focus:bg-transparent">
                        <button class="text-slate-200 hover:text-red-400 ml-2" onclick="excluir(${c.id})">✕</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <div>
                            <p class="mini-label mb-0.5">Inicial</p>
                            <input type="text" value="${aplicarMascaraR$(c.inicial * 100)}" oninput="handleInput(this, ${c.id}, 'inicial')">
                        </div>
                        <div>
                            <p class="mini-label mb-0.5">Saldo</p>
                            <input type="text" value="${aplicarMascaraR$(c.saldo * 100)}" oninput="handleInput(this, ${c.id}, 'saldo')">
                        </div>
                    </div>
                    <div id="box-${c.id}" class="p-2 rounded-lg bg-slate-50 flex justify-between items-end border border-slate-100">
                        <div>
                            <p class="text-[8px] font-bold opacity-40 uppercase">Resultado</p>
                            <p id="res-${c.id}" class="text-base font-mono font-black">R$ 0,00</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] font-bold opacity-40 uppercase">${c.proprio ? 'Comissão Pagar' : 'Receber'}</p>
                            <p id="com-val-${c.id}"></p>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-3 pt-3 border-t border-slate-50 items-center">
                        <div class="w-1/3">
                            <p class="mini-label mb-0.5 text-blue-500 text-center">Com %</p>
                            <input type="number" value="${c.comissao}" oninput="db.contas.find(x=>x.id===${c.id}).comissao=this.value; calcular()" class="text-center p-1 bg-white">
                        </div>
                        <div class="w-2/3 flex items-center justify-center gap-2 bg-slate-50 p-1 rounded-lg border border-slate-100 h-[34px] cursor-pointer" onclick="db.contas.find(x=>x.id===${c.id}).proprio=!db.contas.find(x=>x.id===${c.id}).proprio; render()">
                            <input type="checkbox" ${c.proprio ? 'checked' : ''} class="w-3 h-3 accent-blue-600">
                            <span class="text-[8px] font-black text-slate-500 uppercase">${c.proprio ? 'Próprio' : 'Terceiro'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('inputMeta').value = aplicarMascaraR$(db.meta * 100);
            document.getElementById('valUnidade').value = aplicarMascaraR$(db.unidadeValor * 100);
            document.getElementById('qtdUnidades').value = db.unidadeQtd;
            
            handleUnidade();
            calcular();
        }

        render();
    </script>
</body>
</html>
