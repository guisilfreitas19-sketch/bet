<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Lucro Real - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; color: #1e293b; font-family: 'Inter', sans-serif; }
        .card-light { background: white; border-radius: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); transition: all 0.3s; padding: 2rem; border: 1px solid #e2e8f0; }
        .header-glass { background: white; border-radius: 2.5rem; border: 1px solid #e2e8f0; }
        input { background: #f8fafc; border-radius: 0.75rem; padding: 0.6rem; outline: none; border: 1px solid #e2e8f0; width: 100%; font-family: monospace; font-weight: bold; }
        input:focus { border-color: #3b82f6; background: white; }
        .valor-privado { filter: blur(10px); opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <div class="header-glass p-10 mb-10 shadow-sm">
            <div class="grid grid-cols-1 lg:grid-cols-6 gap-8 items-center">
                <div class="lg:col-span-1">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Meu Investimento</p>
                    <input type="text" id="campoBancaBase" class="text-2xl text-blue-600">
                </div>
                <div class="lg:col-span-2">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Lucro Real Líquido</p>
                    <p id="exibirLucro" class="text-5xl font-mono font-black tracking-tighter text-emerald-600">R$ 0,00</p>
                </div>
                <div id="boxSaque" class="lg:col-span-1 border-l pl-8 border-slate-100">
                    <p class="text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-2 italic">Total p/ Saque</p>
                    <p id="exibirSaque" class="text-3xl font-mono font-bold text-emerald-500">R$ 0,00</p>
                </div>
                <div class="lg:col-span-2 flex flex-col gap-3">
                    <button id="btnNovo" class="bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl text-xs font-black uppercase tracking-widest transition-all shadow-lg shadow-blue-200">＋ Nova Conta</button>
                    <div class="flex gap-3">
                        <button id="btnPrivacidade" class="flex-1 bg-slate-50 text-slate-500 py-3 rounded-xl text-[10px] font-black uppercase">👁️ Privacidade</button>
                        <button id="btnReset" class="flex-1 bg-red-50 text-red-500 py-3 rounded-xl text-[10px] font-black uppercase">Fechar Mês</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="listaContas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <script>
        let db = {
            meuInvestimento: parseFloat(localStorage.getItem('b_v2')) || 5000,
            contas: JSON.parse(localStorage.getItem('c_v2')) || [
                { id: 1, nome: 'BETANO - EVERTON', inicial: 4000, saldo: 3300, comissao: 10, proprio: true },
                { id: 2, nome: 'ESTRELA - GUILHERME', inicial: 1000, saldo: 1050, comissao: 0, proprio: true },
                { id: 3, nome: 'BETANO - HINGRID', inicial: 1000, saldo: 980, comissao: 50, proprio: false }
            ],
            privacidade: false
        };

        const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        function calcular() {
            let lucroTotalFinal = 0;
            
            db.contas.forEach(c => {
                let lucroBrutoConta = c.saldo - c.inicial;
                let comissaoR$ = 0;

                // Regra: Só há comissão se houver lucro na conta
                if (lucroBrutoConta > 0) {
                    comissaoR$ = lucroBrutoConta * (c.comissao / 100);
                }

                // Se a banca é própria, meu lucro é: Saldo Atual - Comissão - Investimento Inicial da Conta
                // Se a banca NÃO é própria (Hingrid), meu lucro é apenas a minha parte da comissão
                if (c.proprio) {
                    lucroTotalFinal += (lucroBrutoConta - comissaoR$);
                } else {
                    lucroTotalFinal += comissaoR$;
                }
            });

            const elLucro = document.getElementById('exibirLucro');
            elLucro.innerText = fmt(lucroTotalFinal);
            elLucro.className = `text-5xl font-mono font-black tracking-tighter ${lucroTotalFinal >= 0 ? 'text-emerald-600' : 'text-red-500'}`;
            document.getElementById('exibirSaque').innerText = lucroTotalFinal > 0 ? fmt(lucroTotalFinal) : "R$ 0,00";
            
            localStorage.setItem('b_v2', db.meuInvestimento);
            localStorage.setItem('c_v2', JSON.stringify(db.contas));
        }

        function render() {
            const container = document.getElementById('listaContas');
            container.innerHTML = '';
            db.contas.forEach(c => {
                const div = document.createElement('div');
                div.className = 'card-light';
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <p class="text-[10px] font-black text-blue-600 uppercase tracking-tighter cursor-pointer" onclick="renomear(${c.id})">${c.nome} ✏️</p>
                        <button class="text-slate-300 hover:text-red-500" onclick="excluir(${c.id})">✕</button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Início (Base)</p>
                            <input type="text" value="${fmt(c.inicial)}" oninput="mascara(this, ${c.id}, 'inicial')">
                        </div>
                        <div>
                            <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Saldo Atual</p>
                            <input type="text" value="${fmt(c.saldo)}" oninput="mascara(this, ${c.id}, 'saldo')" class="${db.privacidade ? 'valor-privado' : ''} text-slate-800">
                        </div>
                    </div>

                    <div class="flex items-center justify-between border-t pt-5 mt-2">
                        <div class="w-1/2">
                            <p class="text-[9px] font-black text-red-500 uppercase mb-1">Comissão p/ Terceiro %</p>
                            <input type="number" value="${c.comissao}" oninput="updateVal(${c.id}, 'comissao', this.value)" class="w-20 text-sm">
                        </div>
                        <label class="flex items-center gap-2 cursor-pointer mt-4">
                            <input type="checkbox" ${c.proprio ? 'checked' : ''} onchange="updateVal(${c.id}, 'proprio', this.checked)" class="w-5 h-5 accent-blue-600">
                            <span class="text-[10px] font-black text-slate-500 uppercase">Banca Própria</span>
                        </label>
                    </div>
                `;
                container.appendChild(div);
            });
            calcular();
        }

        window.mascara = (el, id, campo) => {
            let v = el.value.replace(/\D/g, '');
            let n = parseFloat((v / 100).toFixed(2)) || 0;
            if(id === 'BASE') db.meuInvestimento = n;
            else db.contas.find(x => x.id === id)[campo] = n;
            el.value = fmt(n);
            calcular();
        };

        window.updateVal = (id, campo, val) => {
            db.contas.find(x => x.id === id)[campo] = campo === 'comissao' ? parseFloat(val) : val;
            calcular();
        };

        window.renomear = (id) => {
            let n = prompt("Novo nome:");
            if(n) { db.contas.find(x => x.id === id).nome = n.toUpperCase(); render(); }
        };

        window.excluir = (id) => {
            if(confirm("Remover conta?")) { db.contas = db.contas.filter(x => x.id !== id); render(); }
        };

        document.getElementById('btnNovo').onclick = () => {
            db.contas.push({ id: Date.now(), nome: 'NOVA CONTA', inicial: 1000, saldo: 1000, comissao: 0, proprio: true });
            render();
        };

        document.getElementById('btnPrivacidade').onclick = () => { db.privacidade = !db.privacidade; render(); };
        document.getElementById('campoBancaBase').oninput = function() { mascara(this, 'BASE'); };
        document.getElementById('campoBancaBase').value = fmt(db.meuInvestimento);

        render();
    </script>
</body>
</html>
