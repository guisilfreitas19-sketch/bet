<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Bet Dashboard v1.4</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

<style>
body { background:#f8fafc; font-family:Inter; }
.card { background:#fff; border:1px solid #e2e8f0; border-radius:24px; padding:20px; }
input { border-bottom:1px solid #e2e8f0; font-family:'JetBrains Mono'; }
input:focus { outline:none; border-color:#3b82f6; }
</style>
</head>

<body class="p-8">

<div class="max-w-6xl mx-auto">

<h1 class="text-gray-400 text-xs mb-2">SEU LUCRO LÍQUIDO</h1>
<h2 id="total" class="text-5xl text-green-500 font-mono mb-10">R$ 0,00</h2>

<button onclick="novo()" class="bg-black text-white px-5 py-3 rounded-xl mb-6">
+ NOVA CONTA
</button>

<div id="contas" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</div>

<script>
function safe(n){ return isNaN(n) ? 0 : Number(n); }

let data = JSON.parse(localStorage.getItem('db')) || [
 {id:1,nome:'EVERTON',saldo:3400,invest:4000,com:90},
 {id:2,nome:'GUILHERME',saldo:1050,invest:1000,com:100},
 {id:3,nome:'HINGRID',saldo:1000,invest:0,com:50}
];

const fmt = v => safe(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

function salvar(){
 localStorage.setItem('db',JSON.stringify(data));
 calc();
}

function calc(){
 let total = 0;

 data.forEach(c=>{
  let saldo = safe(c.saldo);
  let invest = safe(c.invest);
  let com = safe(c.com);

  let lucro = saldo - invest;

  let meu = 0;

  // 🔥 REGRA NOVA
  if(invest > 0){
    meu = lucro > 0 ? lucro*(com/100) : lucro;
  }

  total += meu;
 });

 document.getElementById('total').innerText = fmt(total);
}

function render(){
 let el = document.getElementById('contas');
 el.innerHTML = '';

 data.forEach(c=>{
  let saldo = safe(c.saldo);
  let invest = safe(c.invest);
  let lucro = saldo - invest;

  let cor = lucro>=0?'text-green-500':'text-red-500';

  el.innerHTML += `
  <div class="card">
    <button onclick="del(${c.id})" class="float-right text-red-400">✕</button>

    <input value="${c.nome}" oninput="upd(${c.id},'nome',this.value)" class="text-blue-500 font-bold w-full mb-3">

    <div class="text-xs text-gray-400 mb-2">
      Invest:
      <input value="${fmt(invest)}" oninput="maskInvest(this,${c.id})" onfocus="this.select()" class="w-24">

      Comissão:
      <input type="number" value="${c.com}" oninput="upd(${c.id},'com',this.value)" class="w-12">%
    </div>

    <div class="mb-2">
      Saldo:
      <input value="${fmt(saldo)}" oninput="maskSaldo(this,${c.id})" onfocus="this.select()" class="text-2xl w-full">
    </div>

    <div class="${cor} font-bold">${fmt(lucro)}</div>

    ${invest==0 ? '<div class="text-xs text-gray-400 mt-2">Conta de terceiros (não entra no seu lucro)</div>' : ''}
  </div>
  `;
 });

 calc();
}

function upd(id,campo,val){
 let c = data.find(x=>x.id==id);
 if(!c) return;

 c[campo] = campo=='nome' ? val.toUpperCase() : safe(parseFloat(val));
 salvar();
}

function maskSaldo(el,id){
 let v = el.value.replace(/\D/g,'');
 let n = safe(v/100);

 let c = data.find(x=>x.id==id);
 if(c) c.saldo = n;

 el.value = fmt(n);
 salvar();
}

function maskInvest(el,id){
 let v = el.value.replace(/\D/g,'');
 let n = safe(v/100);

 let c = data.find(x=>x.id==id);
 if(c) c.invest = n;

 el.value = fmt(n);
 salvar();
}

function del(id){
 if(confirm('Remover?')){
  data = data.filter(x=>x.id!=id);
  salvar();
  render();
 }
}

function novo(){
 data.push({id:Date.now(),nome:'NOVA',saldo:0,invest:0,com:100});
 salvar();
 render();
}

render();
</script>

</body>
</html>
