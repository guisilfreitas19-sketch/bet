<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Bet Dashboard - Lucro Real</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet" />
<style>
body { background-color: #f0f4f8; color: #1e293b; font-family: 'Inter', sans-serif; }

.card-oled {
    background: #fff; border-radius: 1.5rem; padding: 1.5rem; position: relative;
    box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: all 0.3s ease;
}
.card-oled:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

input, select { font-family:'JetBrains Mono', monospace; background: transparent; border-bottom:1px solid #e2e8f0; outline:none; transition: all 0.3s; }
input:focus, select:focus { border-color: #3b82f6; }

.valor-privado { filter: blur(14px); opacity: 0.2; pointer-events: none; }

.legenda { display:flex; gap:1.5rem; flex-wrap:wrap; font-size:0.85rem; margin-top:2rem; }
.legenda div { width:20px; height:20px; border-radius:4px; }
.cor-seu { background:#059669; }
.cor-sociedade { background:#2563eb; }
.cor-gestao { background:#f59e0b; }

button { cursor:pointer; }
</style>
</head>
<body class="p-6 md:p-12">

<div class="max-w-7xl mx-auto">

<!-- Top Lucro -->
<div class="bg-white rounded-2xl p-8 mb-6 shadow-xl">
  <p class="text-xs uppercase text-slate-400 font-black mb-2 tracking-wide">Seu Lucro Líquido Total</p>
  <p id="exibirLucro" class="text-4xl font-mono font-bold text-emerald-500">R$ 0,00</p>

  <button id="btnNovoCard" class="mt-4 bg-black text-white py-2 px-4 rounded-xl font-bold text-xs uppercase hover:bg-gray-800 transition">＋ Nova Conta</button>
</div>

<!-- Lista de Contas -->
<div id="listaContas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

<!-- Legenda no rodapé -->
<div class="legenda">
  <span><div class="cor-seu"></div>SEU: dinheiro seu, você fica com 100% do resultado</span>
  <span><div class="cor-sociedade"></div>SOCIEDADE: dinheiro seu, paga % de comissão ao dono da conta</span>
  <span><div class="cor-gestao"></div>GESTÃO: dinheiro de terceiros, você recebe % do lucro</span>
</div>

</div>

<script>
let db = {
  contas: JSON.parse(localStorage.getItem('c_v300')) || [
    { id: 1, nome: 'BETANO EVERTON', saldo: 3400, investimento: 4000, comissao: 10, dono: 'sociedade' },
    { id: 2, nome: 'ESTRELA BET', saldo: 1050, investimento: 1000, comissao: 100, dono: 'seu' },
    { id: 3, nome: 'BETANO INGRID', saldo: 1500, investimento: 1000, comissao: 50, dono: 'gestao' }
  ]
};

const fmt = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

// --- Calcula lucro líquido total ---
function calcular(){
  let total = 0;
  db.contas.forEach(c=>{
    const lucroBruto = c.saldo - c.investimento;
    let lucro = 0;

    if(c.dono==='seu'){
      lucro = c.saldo; // todo saldo é seu
    } else if(c.dono==='sociedade'){
      // Dinheiro seu, paga comissão se lucro positivo
      if(lucroBruto>0){
        const comissao = lucroBruto * (c.comissao/100);
        lucro = c.investimento + (lucroBruto - comissao);
      } else {
        lucro = c.saldo; // prejuízo é seu, sem comissão
      }
    } else if(c.dono==='gestao'){
      // Dinheiro de terceiros, você só ganha comissão
      lucro = lucroBruto>0 ? lucroBruto * (c.comissao/100) : 0;
    }

    total += lucro;
  });

  document.getElementById('exibirLucro').innerText = fmt(total);
}

// --- Renderiza cards ---
function render(){
  const el = document.getElementById('listaContas');
  el.innerHTML = '';

  db.contas.forEach(c=>{
    const lucroBruto = c.saldo - c.investimento;
    let lucroTexto='', lucroVal=0;

    if(c.dono==='seu'){
      lucroVal = c.saldo;
      lucroTexto = `Lucro líquido: ${fmt(lucroVal)}`;
    } else if(c.dono==='sociedade'){
      if(lucroBruto>0){
        const comissao = lucroBruto * (c.comissao/100);
        lucroVal = c.investimento + (lucroBruto - comissao);
        lucroTexto = `Lucro líquido: ${fmt(lucroVal)} (Comissão paga: ${fmt(comissao)})`;
      } else {
        lucroVal = c.saldo;
        lucroTexto = `Lucro líquido: ${fmt(lucroVal)}`;
      }
    } else if(c.dono==='gestao'){
      lucroVal = lucroBruto>0 ? lucroBruto*(c.comissao/100) : 0;
      lucroTexto = `Lucro líquido: ${fmt(lucroVal)}`;
    }

    const lucroClass = lucroVal>=0?'text-green-500':'text-red-500';
    const tipoCor = c.dono==='seu'?'text-green-600': c.dono==='sociedade'?'text-blue-600':'text-yellow-600';

    const card = document.createElement('div');
    card.className = 'card-oled';

    card.innerHTML = `
      <button class="absolute top-4 right-4 text-slate-300 hover:text-red-500" onclick="del(${c.id})">✕</button>

      <input value="${c.nome}" oninput="upd(${c.id},'nome',this.value)" class="w-full text-xs font-bold mb-2 uppercase ${tipoCor}" />

      <div class="flex justify-between text-[10px] text-slate-400">
        <span>Investimento: ${fmt(c.investimento)}</span>
        <span>Saldo: ${fmt(c.saldo)}</span>
      </div>

      <div class="flex justify-between text-[10px] text-slate-400 mt-1">
        <span>Comissão: ${c.comissao}%</span>
        <span>Tipo: <span class="${tipoCor} font-bold">${c.dono.toUpperCase()}</span></span>
      </div>

      <p class="mt-3 text-sm font-mono font-bold ${lucroClass}">${lucroTexto}</p>
    `;

    el.appendChild(card);
  });

  calcular();
}

// --- Atualizações ---
function upd(id,campo,val){
  const c = db.contas.find(x=>x.id===id);
  if(!c) return;
  if(campo==='nome') c.nome = val.toUpperCase();
  if(campo==='comissao') c.comissao = Math.min(100,Math.max(0,parseFloat(val)||0));
  if(campo==='dono') c.dono = val;
  salvar(); render();
}

function del(id){
  db.contas = db.contas.filter(x=>x.id!==id);
  salvar(); render();
}

function salvar(){
  localStorage.setItem('c_v300', JSON.stringify(db.contas));
  calcular();
}

// --- Nova conta ---
document.getElementById('btnNovoCard').onclick=()=>{
  db.contas.push({id:Date.now(),nome:'NOVA CONTA',saldo:0,investimento:0,comissao:100,dono:'seu'});
  salvar(); render();
};

render();
</script>
</body>
</html>
