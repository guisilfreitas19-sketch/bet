<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard 2026 - Versão Blindada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1rem; padding: 1.5rem; position: relative; }
        .lucro { color: #22c55e; }
        .prejuizo { color: #ef4444; }
        input { background: transparent; border-bottom: 1px solid #333; outline: none; width: 100%; font-family: monospace; }
        input:focus { border-color: #3b82f6; }
        .blur-val { filter: blur(8px); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <div class="bg-black border border-gray-800 rounded-3xl p-6 mb-8 grid grid-cols-1 md:grid-cols-4 gap-6 items-center">
            <div>
                <p class="text-[10px] text-gray-500 uppercase font-bold">Investimento Inicial</p>
                <input type="text" id="bancaBaseInput" class="text-xl font-bold text-blue-400">
            </div>
            <div>
                <p class="text-[10px] text-gray-500 uppercase font-bold">Lucro Líquido</p>
                <p id="txtLucro" class="text-xl font-bold">R$ 0,00</p>
            </div>
            <div id="boxSaque" style="opacity: 0.2">
                <p class="text-[10px] text-yellow-600 uppercase font-bold italic">Sugestão de Saque</p>
                <p id="txtSaque" class="text-xl font-bold text-yellow-500">R$ 0,00</p>
            </div>
            <div class="flex gap-2">
                <button id="btnNovo" class="flex-1 bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold text-xs uppercase">＋ Conta</button>
                <button id="btnPrivacidade" class="bg-gray-800 px-4 rounded-xl">👁️</button>
            </div>
        </div>

        <div id="containerContas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>

    <script>
        // Memória do sistema
        let dados = JSON.parse(localStorage.getItem('app_apostas_v10')) || {
            banca: 5000,
            contas: [{ id: 1, nome: 'BETANO - EVERTON', saldo: 0 }],
            privacidade: false
        };

        const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        function salvar() {
            localStorage.setItem('app_apostas_v10', JSON.stringify(dados));
            calcular();
        }

        function calcular() {
            const totalSaldos = dados.contas.reduce((acc, c) => acc + c.saldo, 0);
            const lucro = totalSaldos - dados.banca;
            
            const txtLucro = document.getElementById('txtLucro');
            txtLucro.innerText = fmt(lucro);
            txtLucro.className = `text-xl font-bold ${lucro >= 0 ? 'lucro' : 'prejuizo'}`;

            const boxSaque = document.getElementById('boxSaque');
            const txtSaque = document.getElementById('txtSaque');
            if (lucro > 0) {
                txtSaque.innerText = fmt(lucro);
                boxSaque.style.opacity = "1";
            } else {
                txtSaque.innerText = "R$ 0,00";
                boxSaque.style.opacity = "0.2";
            }
        }

        function render() {
            const container = document.getElementById('containerContas');
            container.innerHTML = '';

            dados.contas.forEach(c => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <button class="absolute top-2 right-3 text-gray-700 hover:text-red-500" onclick="excluir(${c.id})">✕</button>
                    <p class="text-[10px] text-blue-500 font-bold mb-4 cursor-pointer uppercase" onclick="renomear(${c.id})">${c.nome} ✏️</p>
                    <input type="text" value="${fmt(c.saldo)}" oninput="mascara(this, ${c.id})" onfocus="this.select()" class="text-2xl font-mono ${dados.privacidade ? 'blur-val' : ''}">
                `;
                container.appendChild(div);
            });
            calcular();
        }
