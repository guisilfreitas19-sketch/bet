<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bet Dashboard - Gestão de Capital v1.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Inter', sans-serif; }
        .card-oled { 
            background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 2rem; 
            padding: 1.5rem; transition: all 0.3s;
        }
        .card-oled:hover { border-color: #3b82f6; transform: translateY(-4px); }

        input { background: transparent; border-bottom: 1px solid #e2e8f0; font-family: 'JetBrains Mono', monospace; }
        input:focus { border-color: #3b82f6; outline: none; }

        .saque-ativo { border-color: #fbbf24 !important; background: #fffdf2; }
    </style>
</head>

<body class="p-6 md:p-10">

<div class="max-w-7xl mx-auto">

    <!-- HEADER -->
    <div class="bg-white border rounded-3xl p-8 mb-10 shadow">
        <p class="text-xs uppercase text-gray-400 mb-2">Seu Lucro Líquido</p>
        <p id="exibirLucro" class="text-5xl font-mono font-bold text-emerald-500">R$ 0,00</p>
    </div>

    <button id="btnNovoCard" class="mb-6 bg-black text-white px-6 py-3 rounded-xl text-xs uppercase font-bold">
        + Nova Conta
    </button>

    <div id="listaContas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</div>

<script>
// 🔒 proteção
function safeNumber(v) {
    return isNaN(v) || v === null ? 0 : Number(v);
}

// carregar dados
let contasStorage = JSON.parse(localStorage.getItem('c_v105')) || [];

contasStorage = contasStorage.map(c => ({
    ...c,
    saldo: safeNumber(c.saldo),
    investimento: safeNumber(c.investimento),
    comissao: safeNumber(c.comissao)
}));

let db = {
    contas: contasStorage.length ? contasStorage : [
        { id: 1, nome: 'BETANO', saldo: 0, investimento: 4000, comissao: 90 }
    ]
};

const fmt = (v) => safeNumber(v).toLocaleString('pt-BR', {
    style: 'currency',
    currency: 'BRL'
});

// salvar
function salvar() {
    localStorage.setItem('c_v105', JSON.stringify(db.contas));
    calcular();
}

// cálculo correto (LUCRO REAL)
function calcular() {
    let totalLucro = 0;

    db.contas.forEach(c => {
        let saldo = safeNumber(c.saldo);
        let investimento = safeNumber(c.investimento);
        let comissao = safeNumber(c.comissao);

        let lucroBruto = saldo - investimento;
        let lucroMeu = lucroBruto > 0
            ? lucroBruto * (comissao / 100)
            : lucroBruto;

        totalLucro += lucroMeu;
    });

    document.getElementById('exibirLucro').innerText = fmt(totalLucro);
}

// render
function render() {
    const container = document.getElementById('listaContas');
    container.innerHTML = '';

    db.contas.forEach(c => {
        let saldo = safeNumber(c.saldo);
        let investimento = safeNumber(c.investimento);
        let lucro = saldo - investimento;

        const div = document.createElement('div');
        div.className = 'card-oled';

        div.innerHTML = `
            <button onclick="apiExcluir(${c.id})" class="float-right text-red-400">✕</button>

            <input value="${c.nome}" 
                oninput="apiUpdate(${c.id}, 'nome', this.value)" 
                class="font-bold text-blue-500 w-full mb-3">

            <div class="text-xs text-gray-400 mb-2">
                Invest:
                <input 
                    value="${fmt(investimento)}"
                    oninput="apiMascaraInvest(this, ${c.id})"
                    onfocus="this.select()"
                    class="w-24 text-black font-mono">

                Comissão:
                <input 
                    type="number"
                    value="${c.comissao}"
                    oninput="apiUpdate(${c.id}, 'comissao', this.value)"
                    class="w-14">
                %
            </div>

            <div class="mb-2">
                <p class="text-xs text-gray-400">Saldo</p>
                <input 
                    value="${fmt(saldo)}"
                    oninput="apiMascaraSaldo(this, ${c.id})"
                    onfocus="this.select()"
                    class="text-2xl font-mono w-full">
            </div>

            <div class="text-sm font-bold ${lucro >= 0 ? 'text-green-500' : 'text-red-500'}">
                ${fmt(lucro)}
            </div>
        `;

        container.appendChild(div);
    });

    calcular();
}

// update
window.apiUpdate = (id, campo, valor) => {
    const item = db.contas.find(x => x.id === id);
    if (!item) return;

    item[campo] = campo === 'nome'
        ? valor.toUpperCase()
        : safeNumber(parseFloat(valor));

    salvar();
};

// máscara saldo
window.apiMascaraSaldo = (el, id) => {
    let v = el.value.replace(/\D/g, '');
    let n = safeNumber(v / 100);

    const item = db.contas.find(x => x.id === id);
    if (item) item.saldo = n;

    el.value = fmt(n);
    salvar();
};

// máscara investimento
window.apiMascaraInvest = (el, id) => {
    let v = el.value.replace(/\D/g, '');
    let n = safeNumber(v / 100);

    const item = db.contas.find(x => x.id === id);
    if (item) item.investimento = n;

    el.value = fmt(n);
    salvar();
};

// excluir
window.apiExcluir = (id) => {
    if (confirm("Remover conta?")) {
        db.contas = db.contas.filter(x => x.id !== id);
        salvar();
        render();
    }
};

// novo
document.getElementById('btnNovoCard').onclick = () => {
    db.contas.push({
        id: Date.now(),
        nome: 'NOVA CONTA',
        saldo: 0,
        investimento: 0,
        comissao: 100
    });
    salvar();
    render();
};

render();
</script>

</body>
</html>
