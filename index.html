<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard Apostas 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilo OLED - Fundo Preto Absoluto */
        body { background-color: #000; color: #e5e7eb; overflow-x: hidden; }
        
        /* Efeito de Brilho em Cards com Saldo */
        .card-ativo { 
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.08); 
            border-color: rgba(59, 130, 246, 0.5) !important; 
        }

        /* Barras de Progresso Minimalistas */
        .barra-progresso { height: 2px; background: #111; border-radius: 2px; overflow: hidden; margin-top: 12px; }
        .progresso-fill { height: 100%; background: #3b82f6; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Esconder setas de input */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Transições Suaves */
        .transition-all { transition: all 0.4s ease; }

        /* Estilo para ocultar valores (Modo Privacidade) */
        .valor-oculto { filter: blur(8px); pointer-events: none; user-select: none; }
    </style>
</head>
<body class="p-4 md:p-10 font-sans">

    <div class="max-w-7xl mx-auto">
        <div id="headerDinamico" class="bg-black border border-gray-900 rounded-[2rem] p-8 mb-10 shadow-2xl transition-all border-t-4">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-8 items-center text-center md:text-left">
                
                <div class="border-r border-gray-900 pr-4">
                    <p class="text-[10px] font-black text-gray-600 uppercase tracking-[0.2em] mb-2">Investimento Inicial</p>
                    <input type="text" id="bancaInicialInput" onfocus="this.select()" oninput="tratarInputBanca(this)"
                        class="bg-transparent text-2xl font-mono font-bold text-blue-500 outline-none w-full border-b border-transparent focus:border-blue-900 transition-all">
                </div>

                <div class="border-r border-gray-900 pr-4">
                    <p class="text-[10px] font-black text-gray-600 uppercase tracking-[0.2em] mb-2">Saldo Geral</p>
                    <p id="totalGeral" class="text-3xl font-mono font-bold text-white tracking-tighter transition-all">R$ 0,00</p>
                </div>
                
                <div>
                    <p class="text-[10px] text-gray-600 uppercase font-black tracking-[0.2em] mb-2">Lucro do Mês</p>
                    <p id="lucroGeral" class="text-2xl font-mono transition-all">R$ 0,00</p>
                </div>

                <div id="containerSaque" class="border-l border-gray-900 pl-6 transition-all opacity-20">
                    <p class="text-[10px] font-black text-yellow-600 uppercase tracking-[0.2em] mb-2 italic underline font-bold">Sugestão de Saque</p>
                    <p id="saqueRecomendado" class="text-2xl font-mono font-bold text-yellow-500 transition-all">R$ 0,00</p>
                </div>

                <div class="flex flex-col gap-2">
                    <div class="flex gap-2">
                        <button onclick="adicionarConta()" class="flex-1 bg-blue-700 hover:bg-blue-600 text-white py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">+ Conta</button>
                        <button onclick="togglePrivacidade()" class="bg-gray-900 border border-gray-800 text-gray-400 px-3 py-2 rounded-xl hover:text-white transition-all">
                            <span id="eyeIcon">👁️</span>
                        </button>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="exportarDados()" class="flex-1 border border-gray-900 text-gray-600 hover:text-white py-2 rounded-xl text-[9px] font-bold uppercase transition-all">Backup</button>
                        <button onclick="resetarSaldos()" class="flex-1 border border-red-950 text-red-900 hover:text-red-500 py-2 rounded-xl text-[9px] font-bold uppercase transition-all">Zerar</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="gridContas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>

    <script>
        // Dados e Memória
        let bancaBase = parseFloat(localStorage.getItem('banca_v_final')) || 5000;
        let contas = JSON.parse(localStorage.getItem('contas_v_final')) || [
            { id: 1, nome: 'BETANO - EVERTON', saldo: 0 }
        ];
        let modoPrivacidade = false;

        const moneyFormat = (num) => num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        function tratarInputBanca(el) {
            let v = el.value.replace(/\D/g, '');
            bancaBase = parseFloat((v / 100).toFixed(2)) || 0;
            el.value = moneyFormat(bancaBase);
            localStorage.setItem('banca_v_final', bancaBase);
            calcularGlobal();
            renderizarBarras();
        }

        function tratarInputConta(el, id) {
            let v = el.value.replace(/\D/g, '');
            const novoSaldo = parseFloat((v / 100).toFixed(2)) || 0;
            const index = contas.findIndex(c => c.id === id);
            contas[index].saldo = novoSaldo;
            el.value = moneyFormat(novoSaldo);
            localStorage.setItem('contas_v_final', JSON.stringify(contas));
