<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Bancas - Light Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Inter', sans-serif; }
        .card-light { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); transition: all 0.3s; padding: 1.5rem; border: 1px solid #e2e8f0; }
        .card-light:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-color: #3b82f6; }
        
        .header-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 2px solid #3b82f6; border-radius: 2rem; }
        
        input { background: #f1f5f9; border-radius: 0.5rem; padding: 0.5rem; outline: none; border: 1px solid transparent; transition: 0.3s; width: 100%; font-family: monospace; }
        input:focus { border-color: #3b82f6; background: white; }

        .tag-comissao { font-size: 0.65rem; font-weight: 800; color: #ef4444; text-transform: uppercase; }
        .valor-privado { filter: blur(10px); opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body class="p-6 md:p-10">

    <div class="max-w-7xl mx-auto">
        <div id="header" class="header-glass p-8 mb-10 shadow-sm border border-slate-200">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-6 items-center">
                
                <div class="lg:col-span-1">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Meu Investimento</p>
                    <input type="text" id="campoBancaBase" class="text-xl font-bold text-blue-600">
                </div>

                <div class="lg:col-span-2">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Lucro Real (Líquido)</p>
                    <p id="exibirLucro" class="text-4xl font-mono font-black tracking-tighter">R$ 0,00</p>
                </div>

                <div class="lg:col-span-1 border-l pl-6 border-slate-200">
                    <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest mb-1 italic">Total p/ Saque</p>
                    <p id="exibirSaque" class="text-2xl font-mono font-bold text-emerald-500">R$ 0,00</p>
                </div>

                <div class="lg:col-span-2 flex flex-col gap-2">
                    <button id="btnNovo" class="bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all">＋ Nova Conta / Operação</button>
                    <div class="flex gap-2">
                        <button id="btnPrivacidade" class="flex-1 bg-slate-100 text-slate-500 py-2 rounded-lg text-[10px] font-bold">👁️ PRIVACIDADE</button>
                        <button id="btnReset" class="flex-1 bg-red-50 text-red-600 py-2 rounded-lg text-[10px] font-bold">FECHAR MÊS</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="listaContas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        let db = {
            banca: parseFloat(localStorage.getItem('b_light_v1')) || 5000,
            contas: JSON.parse(localStorage.getItem('c_light_v1')) || [
                { id: 1, nome: 'CONTA COMISSÃO EX', saldo: 0, comissao: 10, proprio: true }
            ],
            privacidade: false
        };

        const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        function salvar() {
            localStorage.setItem('b_light_v1', db.banca);
            localStorage.setItem('c_light_v1', JSON.stringify(db.contas));
            calcular();
        }

        function calcular() {
            let lucroBruto = db.contas.reduce((acc, c) => acc + c.saldo, 0) - db.banca;
            
            // Cálculo do Lucro Líquido descontando comissões
            let lucroLiquido = 0;
            let saldoTotal = 0;

            db.contas.forEach(c => {
                saldoTotal += c.saldo;
                // Se a banca for própria, o lucro dela é (saldo - custo_proporcional)
                // Mas para simplificar sua gestão: calculamos o lucro total e tiramos a % de comissão do saldo.
                let desconto = c.saldo * (c.comissao / 100);
                lucroLiquido += (c.saldo - desconto);
            });

            // O seu lucro real é o que sobra de tudo após tirar o que você investiu
            let resultadoFinal = lucroLiquido - db.banca;

            const elLucro = document.getElementById('exibirLucro');
            elLucro.innerText = fmt(resultadoFinal);
            elLucro.className = `text-4xl font-mono font-black tracking-tighter ${resultadoFinal >= 0 ? 'text-emerald-600' : 'text-red-600'}`;
            
            document.getElementById('exibirSaque').innerText = resultadoFinal > 0 ? fmt(resultadoFinal) : "R$ 0,00";
            
            if(db.privacidade) elLucro.classList.add('valor-privado');
            else elLucro.classList.remove('valor-privado');
        }

        function render() {
            const container = document.getElementById('listaContas');
            container.innerHTML = '';
            db.contas.forEach(c => {
                const div = document.createElement('div');
                div.className = 'card-light relative';
                div.innerHTML = `
                    <button class="absolute top-4 right-4 text-slate-300 hover:text-red-500" onclick="excluir(${c.id})">✕</button>
                    
                    <div class="mb-4">
                        <p class="text-[9px] font-bold text-blue-500 uppercase mb-1 cursor-pointer" onclick="renomear(${c.id})">${c.nome} ✏️</p>
                        <input type="text" value="${fmt(c.saldo)}" oninput="mascara(this, ${c.id})" class="text-2xl font-bold ${db.privacidade ? 'valor-privado' : ''}">
                    </div>

                    <div class="grid grid-cols-2 gap-4 border-t pt-4">
                        <div>
                            <p class="tag-comissao mb-1">Comissão p/ Terceiro</p>
                            <div class="flex items-center gap-2">
                                <input type="number" value="${c.comissao}" oninput="setComissao(${c.id}, this.value)" class="text-xs p-1 w-16">
                                <span class="text-xs font-bold text-slate-400">%</span>
                            </div>
                        </div>
                        <div class="flex flex-col justify-end">
                             <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" ${c.proprio ? 'checked' : ''} onchange="setProprio(${c.id}, this.checked)" class="w-4 h-4">
                                <span class="text-[9px] font-bold text-slate-500 uppercase">Banca Própria</span>
                             </label>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            calcular();
        }

        window.mascara = (el, id) => {
            let v = el.value.replace(/\D/g, '');
            let n = parseFloat((v / 100).toFixed(2)) || 0;
            if(id === 'BANCA') db.banca = n;
            else db.contas.find(x => x.id === id).saldo = n;
            el.value = fmt(n);
            salvar();
        };

        window.setComissao = (id, val) => {
            db.contas.find(x => x.id === id).comissao = parseFloat(val) || 0;
            salvar();
        };

        window.setProprio = (id, val) => {
            db.contas.find(x => x.id === id).proprio = val;
            // Se não for própria, ela não abate do "Investimento Base"
            salvar();
        };

        window.renomear = (id) => {
            let n = prompt("Nome:");
            if(n) { db.contas.find(x => x.id === id).nome = n.toUpperCase(); render(); salvar(); }
        };

        window.excluir = (id) => {
            if(confirm("Excluir?")) { db.contas = db.contas.filter(x => x.id !== id); render(); salvar(); }
        };

        document.getElementById('btnNovo').onclick = () => {
            db.contas.push({ id: Date.now(), nome: 'NOVA CONTA', saldo: 0, comissao: 0, proprio: true });
            render(); salvar();
        };

        document.getElementById('btnPrivacidade').onclick = () => { db.privacidade = !db.privacidade; render(); };
        
        document.getElementById('campoBancaBase').oninput = function() { mascara(this, 'BANCA'); };
        document.getElementById('campoBancaBase').value = fmt(db.banca);

        render();
    </script>
</body>
</html>
