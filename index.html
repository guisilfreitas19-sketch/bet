<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Lucro Total 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #e5e7eb; font-family: sans-serif; transition: all 0.5s; }
        .body-privado { background-color: #0c0d10 !important; }
        .card-oled { background-color: #000; border: 1px solid #1a1a1a; border-radius: 1.5rem; transition: all 0.3s; }
        .card-oled:hover { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); }
        .barra-progresso { height: 2px; background: #111; border-radius: 2px; overflow: hidden; margin-top: 12px; }
        .progresso-fill { height: 100%; transition: width 0.8s ease, background-color 0.8s ease; width: 0%; }
        .barra-vazia { background-color: #333; }
        .barra-ok { background-color: #3b82f6; }
        .barra-meta { background-color: #fbbf24; }
        input { background: transparent; border-bottom: 1px solid #1a1a1a; outline: none; width: 100%; transition: all 0.3s; font-family: monospace; }
        input:focus { border-color: #3b82f6; }
        .valor-privado { filter: blur(12px) grayscale(100%); pointer-events: none; opacity: 0.5; }
        .borda-privada { border-top-color: #1f2937 !important; }
    </style>
</head>
<body class="p-6 md:p-10">

    <div class="max-w-7xl mx-auto">
        <div id="headerDinamico" class="bg-black border border-gray-900 rounded-[2rem] p-8 mb-10 border-t-4 transition-all shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-6 items-center">
                
                <div class="lg:col-span-1 pr-4">
                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Banca Inicial</p>
                    <input type="text" id="campoBancaBase" class="text-2xl font-bold text-blue-500">
                </div>

                <div class="lg:col-span-2 flex items-center gap-4">
                    <div>
                        <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Lucro Acumulado</p>
                        <p id="exibirLucro" class="text-4xl font-mono font-bold tracking-tighter transition-all">R$ 0,00</p>
                    </div>
                    <div class="flex items-center gap-2 border border-gray-800 px-3 py-1 rounded-full bg-black">
                        <span id="txtStatus" class="text-[11px] font-bold uppercase tracking-tighter text-gray-600">--</span>
                        <span id="emojiSaude" class="text-2xl">⚖️</span>
                    </div>
                </div>

                <div id="containerSaque" class="border-l border-gray-900 pl-6 flex items-center gap-4 transition-all opacity-20">
                    <div>
                        <p class="text-[10px] font-black text-yellow-600 uppercase tracking-widest mb-1 italic underline font-bold">Total p/ Saque</p>
                        <p id="exibirSaqueTotal" class="text-2xl font-mono font-bold text-yellow-500">R$ 0,00</p>
                    </div>
                </div>

                <div class="lg:col-span-2 flex flex-col gap-2">
                    <button id="botaoAdd" class="bg-blue-700 hover:bg-blue-600 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">＋ ADICIONAR CONTA</button>
                    <div class="flex gap-2">
                        <button id="btnPrivacidade" class="flex-1 bg-gray-900 border border-gray-800 text-gray-400 py-2 rounded-xl text-xs">👁️ MODO PRIVADO</button>
                        <button id="btnReset" class="flex-1 bg-red-950 border border-red-900 text-red-600 py-2 rounded-xl text-[9px] font-bold uppercase transition-all">REALIZAR SAQUE / RESET</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="listaContas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>

        <div id="logAnterior" class="mt-16 text-center border-t border-gray-900 pt-6 opacity-30 hover:opacity-100 transition-opacity">
            <p class="text-[11px] font-bold text-gray-700 uppercase tracking-widest mb-1">Último Saque Realizado</p>
            <p id="exibirMemoria" class="text-lg font-mono text-gray-600">Nenhum saque registrado</p>
        </div>
    </div>

    <script>
        let bancaBase = parseFloat(localStorage.getItem('banca_v103')) || 5000;
        let contas = JSON.parse(localStorage.getItem('contas_v103')) || [{ id: Date.now(), nome: 'BETANO - EVERTON', saldo: 0 }];
        let memoriaAnterior = localStorage.getItem('memoria_v103') || "Nenhum saque registrado";
        let privacidade = false;

        const real = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        function atualizar() {
            let soma = contas.reduce((acc, c) => acc + c.saldo, 0);
            let lucro = soma - bancaBase;
            let porcentagemLucro = bancaBase > 0 ? (lucro / bancaBase) * 100 : 0;

            const displayLucro = document.getElementById('exibirLucro');
            const displaySaque = document.getElementById('exibirSaqueTotal');
            const containerSaque = document.getElementById('containerSaque');
            const header = document.getElementById('headerDinamico');
            const body = document.body;

            displayLucro.innerText = real(lucro);
            
            if (privacidade) {
                displayLucro.className = "text-4xl font-mono font-bold tracking-tighter valor-privado";
                header.classList.add('borda-privada');
                body.classList.add('body-privado');
                containerSaque.style.opacity = "0.1";
            } else {
                body.classList.remove('body-privado');
                header.classList.remove('borda-privada');
                
                let colorClass, emoji, status;
                if (porcentagemLucro > 20) { colorClass = "text-green-400"; emoji = "🔥"; status = "Excelente"; }
                else if (porcentagemLucro > 0) { colorClass = "text-green-500"; emoji = "📈"; status = "Em Lucro"; }
                else if (porcentagemLucro >= -10) { colorClass = "text-gray-500"; emoji = "⚖️"; status = "Est
