<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bet V2.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Inter', sans-serif; }
        .card-light { background: white; border-radius: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); padding: 2rem; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
        .card-negativo { border-left: 6px solid #ef4444; }
        .header-glass { background: white; border-radius: 2.5rem; border: 1px solid #e2e8f0; position: sticky; top: 20px; z-index: 50; }
        input { background: #f1f5f9; border-radius: 0.75rem; padding: 0.6rem; outline: none; border: 1px solid #e2e8f0; width: 100%; font-family: monospace; font-weight: bold; text-align: right; color: #334155; }
        input:focus { border-color: #3b82f6; background: white; color: #2563eb; }
        .mini-label { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; }
        .progress-fill { transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .glow-success { box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <div class="header-glass p-8 mb-8 shadow-sm border-t-4 border-blue-600">
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-8 items-center">
                <div class="lg:col-span-1 border-r border-slate-100 pr-6">
                    <p class="mini-label mb-2">Aporte Próprio</p>
                    <p id="exibirInvestimentoTotal" class="text-2xl font-mono font-bold text-slate-700 tracking-tighter">R$ 0,00</p>
                </div>
                <div class="lg:col-span-2 px-4">
                    <p id="labelLucro" class="mini-label mb-2">Lucro Real Líquido</p>
                    <p id="exibirLucro" class="text-5xl font-mono font-black tracking-tighter text-emerald-600">R$ 0,00</p>
                    <div class="flex gap-4 mt-2">
                        <div class="text-[10px] font-bold text-slate-500">🏦 Próprio: <span id="resumoProprio" class="text-emerald-600">R$ 0,00</span></div>
                        <div class="text-[10px] font-bold text-slate-500">🤝 Comissões: <span id="resumoComissoes" class="text-blue-600">R$ 0,00</span></div>
                    </div>
                </div>
                
                <div class="lg:col-span-2 bg-slate-50 p-6 rounded-3xl border border-slate-200">
                    <div class="flex justify-between items-center mb-2">
                        <p class="mini-label text-slate-500">Meta do Mês (Alvo)</p>
                        <div class="relative w-36">
                            <input type="text" id="inputMeta" class="text-xs py-1.5 px-3 bg-white border-slate-200 shadow-sm" placeholder="R$ 0,00">
                        </div>
                    </div>
                    <div id="containerBarra" class="w-full bg-slate-200 h-5 rounded-full overflow-hidden p-1">
                        <div id="barraMeta" class="progress-fill h-full rounded-full bg-emerald-500" style="width: 0%"></div>
                    </div>
                    <div class="flex justify-between mt-2">
                        <p id="porcentagemMeta" class="text-[10px] font-black text-emerald-600 bg-emerald-50 px-2 rounded-md">0%</p>
                        <p id="faltaMeta" class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Faltam R$ 0,00</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center mb-8">
             <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">Painel de Controle Bet V2.7</h2>
             <button onclick="addConta()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-blue-100 transition-all active:scale-95">＋ Nova Banca</button>
        </div>

        <div id="listaContas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('bet_v27_final')) || {
            meta: 5000,
            contas: [
                { id: 1, nome: 'BETANO - EVERTON', inicial: 4000, saldo: 5000, comissao: 10, proprio: true },
                { id: 2, nome: 'ESTRELA - GUILHERME', inicial: 1000, saldo: 2000, comissao: 0, proprio: true },
                { id: 3, nome: 'BETANO - HINGRID', inicial: 1000, saldo: 2000, comissao: 50, proprio: false }
            ]
        };

        const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        function aplicarMascaraR$(valor) {
            let v = String(valor).replace(/\D/g, '');
            let n = (Number(v) / 100);
            return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function calcular() {
            let aporte = 0, lucroProprio = 0, comissoes = 0;
            
            db.contas.forEach(c => {
                const lucroBruto = c.saldo - c.inicial;
                const valorComR$ = lucroBruto > 0 ? lucroBruto * (c.comissao / 100) : 0;
                
                const cardEl = document.getElementById(`card-${c.id}`);
                const resEl = document.getElementById(`res-${c.id}`);
                const boxEl = document.getElementById(`box-${c.id}`);
                const comValEl = document.getElementById(`com-val-${c.id}`);

                if(resEl) {
                    resEl.innerText = fmt(lucroBruto);
                    if(lucroBruto < 0) cardEl.classList.add('card-negativo');
                    else cardEl.classList.remove('card-negativo');

                    boxEl.className = `mt-4 p-4 rounded-xl border transition-all ${lucroBruto >= 0 ? 'bg-emerald-50 border-emerald-100 text-emerald-700' : 'bg-red-50 border-red-100 text-red-600'}`;
                    comValEl.innerText = fmt(valorComR$);
                    comValEl.className = `text-xs font-bold font-mono ${c.proprio ? 'text-red-400' : 'text-blue-600'}`;
                }

                if (c.proprio) {
                    aporte += c.inicial;
                    lucroProprio += (lucroBruto - valorComR$);
                } else {
                    comissoes += valorComR$;
                }
            });

            const totalGeral = lucroProprio + comissoes;
            document.getElementById('exibirInvestimentoTotal').innerText = fmt(aporte);
            document.getElementById('exibirLucro').innerText = fmt(totalGeral);
            document.getElementById('exibirLucro').className = `text-5xl font-mono font-black tracking-tighter ${totalGeral >= 0 ? 'text-emerald-600' : 'text-red-500'}`;
            document.getElementById('resumoProprio').innerText = fmt(lucroProprio);
            document.getElementById('resumoComissoes').innerText = fmt(comissoes);

            // Lógica de Meta
            const pct = Math.min(Math.max((totalGeral / db.meta) * 100, 0), 100);
            const falta = Math.max(db.meta - totalGeral, 0);
            const barra = document.getElementById('barraMeta');
            const labelLucro = document.getElementById('labelLucro');
            
            barra.style.width = `${pct}%`;
            document.getElementById('porcentagemMeta').innerText = `${pct.toFixed(1)}%`;
            
            if(totalGeral >= db.meta) {
                document.getElementById('faltaMeta').innerText = "OBJETIVO ALCANÇADO! ✅";
                barra.classList.add('glow-success');
                labelLucro.innerText = "🚀 META SUPERADA!";
                labelLucro.className = "mini-label mb-2 text-emerald-500 font-black animate-bounce";
            } else {
                document.getElementById('faltaMeta').innerText = `Faltam ${fmt(falta)}`;
                barra.classList.remove('glow-success');
                labelLucro.innerText = "Lucro Real Líquido";
                labelLucro.className = "mini-label mb-2";
            }

            localStorage.setItem('bet_v27_final', JSON.stringify(db));
        }

        window.handleInput = (el, id, field) => {
            let rawValue = el.value.replace(/\D/g, '');
            let numericValue = parseFloat(rawValue) / 100;
            if(id === 'META') db.meta = numericValue;
            else db.contas.find(c => c.id === id)[field] = numericValue;
            el.value = aplicarMascaraR$(rawValue);
            calcular();
        };

        function addConta() {
            db.contas.push({ id: Date.now(), nome: 'NOVA BANCA', inicial: 0, saldo: 0, comissao: 0, proprio: true });
            render();
        }

        function excluir(id) {
            if(confirm("Remover banca?")) { db.contas = db.contas.filter(c => c.id !== id); render(); }
        }

        function render() {
            const container = document.getElementById('listaContas');
            container.innerHTML = db.contas.map(c => `
                <div id="card-${c.id}" class="card-light">
                    <div class="flex justify-between items-center mb-6">
                        <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest">${c.nome}</p>
                        <button class="text-slate-300 hover:text-red-500 transition-colors" onclick="excluir(${c.id})">✕</button>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <p class="mini-label mb-1">Aporte Inicial</p>
                            <input type="text" value="${aplicarMascaraR$(c.inicial * 100)}" oninput="handleInput(this, ${c.id}, 'inicial')">
                        </div>
                        <div>
                            <p class="mini-label mb-1">Saldo Atual</p>
                            <input type="text" value="${aplicarMascaraR$(c.saldo * 100)}" oninput="handleInput(this, ${c.id}, 'saldo')">
                        </div>
                    </div>

                    <div id="box-${c.id}">
                        <div class="flex justify-between items-center mb-1">
                            <p class="text-[9px] font-bold opacity-30 uppercase tracking-tighter">Bruto Total</p>
                            <span class="text-[9px] font-black uppercase opacity-30">${c.proprio ? 'Pagar p/ Parceiro' : 'Sua Comissão'}</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <p id="res-${c.id}" class="text-2xl font-mono font-black tracking-tighter">R$ 0,00</p>
                            <p id="com-val-${c.id}" class="font-mono"></p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 border-t border-slate-50 pt-5 mt-5">
                        <div>
                            <p class="mini-label text-blue-500 mb-1">Comissão %</p>
                            <input type="number" value="${c.comissao}" oninput="db.contas.find(x=>x.id===${c.id}).comissao=this.value; calcular()" class="text-center pr-0 bg-white">
                        </div>
                        <label class="flex flex-col gap-1 cursor-pointer">
                            <span class="mini-label">Origem Capital</span>
                            <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-xl border border-slate-100 h-[42px] justify-center">
                                <input type="checkbox" ${c.proprio ? 'checked' : ''} onchange="db.contas.find(x=>x.id===${c.id}).proprio=this.checked; render()" class="w-4 h-4 accent-blue-600">
                                <span class="text-[9px] font-black text-slate-500 uppercase">${c.proprio ? 'Meu Bolso' : 'Terceiro'}</span>
                            </div>
                        </label>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('inputMeta').value = aplicarMascaraR$(db.meta * 100);
            document.getElementById('inputMeta').oninput = function() { handleInput(this, 'META'); };
            calcular();
        }

        render();
    </script>
</body>
</html>
