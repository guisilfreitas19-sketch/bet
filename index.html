<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão Pro - Investimento Automático</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Inter', sans-serif; }
        .card-light { background: white; border-radius: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); transition: all 0.3s; padding: 2rem; border: 1px solid #e2e8f0; }
        .header-glass { background: white; border-radius: 2.5rem; border: 1px solid #e2e8f0; position: sticky; top: 20px; z-index: 50; }
        input { background: #f1f5f9; border-radius: 0.75rem; padding: 0.6rem; outline: none; border: 1px solid #e2e8f0; width: 100%; font-family: monospace; font-weight: bold; }
        input:focus { border-color: #3b82f6; background: white; }
        .valor-privado { filter: blur(10px); opacity: 0.3; pointer-events: none; }
        .mini-label { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <div class="header-glass p-8 mb-12 shadow-sm border-t-4 border-emerald-500">
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-8 items-center">
                
                <div class="lg:col-span-1 border-r border-slate-100 pr-6">
                    <p class="mini-label mb-2">Meu Aporte Total</p>
                    <p id="exibirInvestimentoTotal" class="text-2xl font-mono font-bold text-slate-700">R$ 0,00</p>
                    <p class="text-[8px] text-slate-400 uppercase font-bold mt-1">Soma das Bancas Próprias</p>
                </div>

                <div class="lg:col-span-2 px-4">
                    <p class="mini-label mb-2">Lucro Real Líquido</p>
                    <p id="exibirLucro" class="text-5xl font-mono font-black tracking-tighter text-emerald-600">R$ 0,00</p>
                    <div class="flex gap-4 mt-2">
                        <div class="text-[10px] font-bold text-slate-500">🏦 Próprio: <span id="resumoProprio" class="text-emerald-600">R$ 0,00</span></div>
                        <div class="text-[10px] font-bold text-slate-500">🤝 Comissões: <span id="resumoComissoes" class="text-blue-600">R$ 0,00</span></div>
                    </div>
                </div>

                <div class="lg:col-span-1 bg-emerald-50 p-4 rounded-2xl border border-emerald-100 text-center">
                    <p class="mini-label text-emerald-700 mb-1">Disponível p/ Saque</p>
                    <p id="exibirSaque" class="text-2xl font-mono font-bold text-emerald-600">R$ 0,00</p>
                </div>

                <div class="lg:col-span-1 flex flex-col gap-2">
                    <button id="btnNovo" class="bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">＋ Nova Conta</button>
                    <button id="btnPrivacidade" class="bg-slate-100 text-slate-500 py-2 rounded-xl text-[9px] font-black uppercase">👁️ Privacidade</button>
                </div>
            </div>
        </div>

        <div id="listaContas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <script>
        let db = {
            contas: JSON.parse(localStorage.getItem('c_v22')) || [
                { id: 1, nome: 'BETANO - EVERTON', inicial: 4000, saldo: 3300, comissao: 10, proprio: true },
                { id: 2, nome: 'ESTRELA - GUILHERME', inicial: 1000, saldo: 1050, comissao: 0, proprio: true },
                { id: 3, nome: 'BETANO - HINGRID', inicial: 1000, saldo: 980, comissao: 50, proprio: false }
            ],
            privacidade: false
        };

        const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        function calcular() {
            let aporteTotal = 0;
            let lucroProprioTotal = 0;
            let comissoesReceberTotal = 0;
            
            db.contas.forEach(c => {
                let lucroBrutoConta = c.saldo - c.inicial;
                let valorComissao = 0;

                if (lucroBrutoConta > 0) {
                    valorComissao = lucroBrutoConta * (c.comissao / 100);
                }

                if (c.proprio) {
                    aporteTotal += c.inicial; // Soma automática do investimento
                    lucroProprioTotal += (lucroBrutoConta - valorComissao);
                } else {
                    comissoesReceberTotal += valorComissao;
                }
            });

            let lucroFinal = lucroProprioTotal + comissoesReceberTotal;

            document.getElementById('exibirInvestimentoTotal').innerText = fmt(aporteTotal);
            const elLucro = document.getElementById('exibirLucro');
            elLucro.innerText = fmt(lucroFinal);
            elLucro.className = `text-5xl font-mono font-black tracking-tighter ${lucroFinal >= 0 ? 'text-emerald-600' : 'text-red-500'}`;
            
            document.getElementById('resumoProprio').innerText = fmt(lucroProprioTotal);
            document.getElementById('resumoComissoes').innerText = fmt(comissoesReceberTotal);
            document.getElementById('exibirSaque').innerText = lucroFinal > 0 ? fmt(lucroFinal) : "R$ 0,00";
            
            localStorage.setItem('c_v22', JSON.stringify(db.contas));
        }

        function render() {
            const container = document.getElementById('listaContas');
            container.innerHTML = '';
            db.contas.forEach(c => {
                const lucroConta = c.saldo - c.inicial;
                const div = document.createElement('div');
                div.className = 'card-light';
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <p class="text-[10px] font-black text-blue-600 uppercase tracking-tighter cursor-pointer" onclick="renomear(${c.id})">${c.nome} ✏️</p>
                        <button class="text-slate-300 hover:text-red-500" onclick="excluir(${c.id})">✕</button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <p class="mini-label mb-1">Custo Inicial</p>
                            <input type="text" value="${fmt(c.inicial)}" oninput="mascara(this, ${c.id}, 'inicial')">
                        </div>
                        <div>
                            <p class="mini-label mb-1">Saldo Atual</p>
                            <input type="text" value="${fmt(c.saldo)}" oninput="mascara(this, ${c.id}, 'saldo')" class="${db.privacidade ? 'valor-privado' : ''}">
                        </div>
                    </div>

                    <div class="mt-4 p-3 rounded-xl ${lucroConta >= 0 ? 'bg-emerald-50' : 'bg-red-50'} border border-slate-50">
                         <p class="text-[9px] font-bold text-slate-400 uppercase">Resultado da Banca</p>
                         <p class="text-lg font-mono font-bold ${lucroConta >= 0 ? 'text-emerald-600' : 'text-red-500'}">
                            ${fmt(lucroConta)}
                         </p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 border-t pt-5 mt-5">
                        <div>
                            <p class="mini-label text-blue-600 mb-1">Comissão %</p>
                            <input type="number" value="${c.comissao}" oninput="updateVal(${c.id}, 'comissao', this.value)" class="w-20 text-sm">
                        </div>
                        <label class="flex flex-col gap-1 cursor-pointer">
                            <span class="mini-label">Origem do Capital</span>
                            <div class="flex items-center gap-2">
                                <input type="checkbox" ${c.proprio ? 'checked' : ''} onchange="updateVal(${c.id}, 'proprio', this.checked)" class="w-5 h-5 accent-blue-600">
                                <span class="text-[9px] font-black text-slate-500 uppercase">${c.proprio ? 'Meu Bolso' : 'Terceiro'}</span>
                            </div>
                        </label>
                    </div>
                `;
                container.appendChild(div);
            });
            calcular();
        }

        window.mascara = (el, id, campo) => {
            let v = el.value.replace(/\D/g, '');
            let n = parseFloat((v / 100).toFixed(2)) || 0;
            db.contas.find(x => x.id === id)[campo] = n;
            el.value = fmt(n);
            calcular();
        };

        window.updateVal = (id, campo, val) => {
            db.contas.find(x => x.id === id)[campo] = campo === 'comissao' ? parseFloat(val) : val;
            if(campo === 'proprio') render();
            else calcular();
        };

        window.renomear = (id) => {
            let n = prompt("Novo nome:");
            if(n) { db.contas.find(x => x.id === id).nome = n.toUpperCase(); render(); }
        };

        window.excluir = (id) => {
            if(confirm("Remover conta?")) { db.contas = db.contas.filter(x => x.id !== id); render(); }
        };

        document.getElementById('btnNovo').onclick = () => {
            db.contas.push({ id: Date.now(), nome: 'NOVA CONTA', inicial: 1000, saldo: 1000, comissao: 0, proprio: true });
            render();
        };

        document.getElementById('btnPrivacidade').onclick = () => { db.privacidade = !db.privacidade; render(); };

        render();
    </script>
</body>
</html>
