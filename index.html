<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Bet Dashboard - Gestão de Capital v1.3</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet" />
<style>
body { background-color: #f8fafc; color: #1e293b; font-family: 'Inter', sans-serif; }
.card-oled { 
    background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 2rem; 
    padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.02);
}
.card-oled:hover { border-color: #3b82f6; transform: translateY(-4px); }
input { border-bottom: 1px solid #e2e8f0; outline: none; }
.valor-privado { filter: blur(14px); opacity: 0.2; }

.legenda { font-size: 0.9rem; display: flex; gap: 1.5rem; flex-wrap: wrap; }
.legenda div { width: 20px; height: 20px; border-radius: 4px; }
.cor-seu { background:#059669; }
.cor-sociedade { background:#2563eb; }
.cor-gestao { background:#f59e0b; }
</style>
</head>

<body class="p-6 md:p-12">

<div class="max-w-7xl mx-auto">

<div class="bg-white border rounded-3xl p-8 mb-6 shadow">
<p class="text-xs uppercase text-slate-400">Seu Lucro Líquido</p>
<p id="exibirLucro" class="text-4xl font-bold text-emerald-500">R$ 0,00</p>

<div class="legenda mt-4">
<span><div class="cor-seu"></div> SEU: dinheiro seu, recebe investimento + % do lucro</span>
<span><div class="cor-sociedade"></div> SOCIEDADE: dinheiro é seu, mas você paga % do lucro ao dono da conta</span>
<span><div class="cor-gestao"></div> GESTÃO: dinheiro de terceiros, você ganha % do lucro</span>
</div>

<button id="btnNovoCard" class="mt-4 bg-black text-white px-4 py-2 rounded-xl">Nova Conta</button>
</div>

<div id="listaContas" class="grid md:grid-cols-3 gap-6"></div>

</div>

<script>
let db = {
contas: JSON.parse(localStorage.getItem('c_v105')) || [],
privacidade: false
};

const fmt = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

function salvar(){
localStorage.setItem('c_v105', JSON.stringify(db.contas));
calcular();
}

function calcular(){
let total = 0;

db.contas.forEach(c=>{
const lucroBruto = c.saldo - c.investimento;

if(c.dono === 'seu'){
const lucro = lucroBruto * (c.comissao/100);
total += c.investimento + lucro;

}else if(c.dono === 'sociedade'){
const comissaoPaga = lucroBruto * (c.comissao/100);
const lucroLiquido = lucroBruto - comissaoPaga;
total += c.investimento + lucroLiquido;

}else if(c.dono === 'gestao'){
const lucro = lucroBruto * (c.comissao/100);
total += lucro;
}
});

document.getElementById('exibirLucro').innerText = fmt(total);
}

function render(){
const el = document.getElementById('listaContas');
el.innerHTML='';

db.contas.forEach(c=>{
const lucro = c.saldo - c.investimento;

el.innerHTML += `
<div class="card-oled">
<button onclick="del(${c.id})">X</button>

<input value="${c.nome}" oninput="upd(${c.id},'nome',this.value)" />

<p>Invest</p>
<input value="${fmt(c.investimento)}" oninput="money(this,${c.id},'investimento')" />

<p>Saldo</p>
<input value="${fmt(c.saldo)}" oninput="money(this,${c.id},'saldo')" />

<p>Comissão</p>
<input type="number" value="${c.comissao}" oninput="upd(${c.id},'comissao',this.value)" />

<p>Tipo</p>
<select onchange="upd(${c.id},'dono',this.value)">
<option value="seu" ${c.dono==='seu'?'selected':''}>Seu</option>
<option value="sociedade" ${c.dono==='sociedade'?'selected':''}>Sociedade</option>
<option value="gestao" ${c.dono==='gestao'?'selected':''}>Gestão</option>
</select>

<p>Lucro: ${fmt(lucro)}</p>
</div>
`;
});

calcular();
}

function upd(id,campo,val){
let c = db.contas.find(x=>x.id===id);
if(!c) return;

if(campo==='nome') c.nome = val.toUpperCase();
if(campo==='comissao') c.comissao = Math.min(100, Math.max(0, parseFloat(val)||0));
if(campo==='dono') c.dono = val;

salvar(); render();
}

function money(el,id,campo){
let v = el.value.replace(/\D/g,'');
let n = (v/100)||0;

let c = db.contas.find(x=>x.id===id);
c[campo]=n;

el.value = fmt(n);
salvar(); render();
}

function del(id){
db.contas = db.contas.filter(x=>x.id!==id);
salvar(); render();
}

document.getElementById('btnNovoCard').onclick=()=>{
db.contas.push({
id:Date.now(),
nome:'NOVA CONTA',
saldo:0,
investimento:0,
comissao:100,
dono:'seu'
});
salvar(); render();
};

render();
</script>

</body>
</html>
